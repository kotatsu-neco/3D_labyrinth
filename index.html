<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>地下環廊の踏査隊</title>
<style>
:root{
  --bg:#050505;
  --panel:#0b0b0b;
  --panel2:#111;
  --line:#d7d0b2;
  --line2:#6f684f;
  --text:#f5f0dc;
  --muted:#b9b08f;
  --danger:#f1a3a3;
  --good:#bfe6b8;
  --warn:#f4d48a;
  --shadow:#000;
  --button:#141414;
  --button2:#1e1e1e;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.35;overflow-x:hidden;touch-action:manipulation;}
body{min-height:100svh;}
button,input,select{font:inherit;}
button{appearance:none;border:1px solid var(--line);background:linear-gradient(#181818,#080808);color:var(--text);min-height:48px;border-radius:6px;padding:9px 10px;box-shadow:0 1px 0 #333 inset,0 0 0 1px #000;}
button:active{transform:translateY(1px);background:var(--button2);}
button:disabled{opacity:.35;}
#app{width:100%;max-width:540px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column;padding:8px 8px calc(env(safe-area-inset-bottom,0px) + 8px);}
.frame{border:1px solid var(--line);background:var(--panel);box-shadow:0 0 0 1px var(--shadow) inset;margin-bottom:8px;}
.header{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;padding:7px 8px;font-size:13px;position:sticky;top:0;z-index:5;background:#050505;border-bottom:1px solid var(--line2);}
.header .title{font-weight:700;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header .meta{text-align:right;color:var(--muted);font-size:12px;}
.main{flex:0 0 auto;}
.panel{padding:10px;}
.screenTitle{font-size:18px;font-weight:800;letter-spacing:.08em;margin:0 0 8px;border-bottom:1px solid var(--line2);padding-bottom:5px;}
.subtle{color:var(--muted);font-size:13px;}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 8px;font-size:13px;}
.kv b{color:var(--warn);font-weight:650;}
.scene{padding:6px;background:#000;}
#dungeonCanvas{display:block;width:100%;height:clamp(188px,34svh,268px);border:1px solid var(--line);background:#030303;}
.enemyStage{min-height:clamp(172px,30svh,238px);border:1px solid var(--line);background:radial-gradient(circle at 50% 30%,#181818,#040404 58%,#000);display:flex;flex-direction:column;justify-content:center;gap:8px;padding:12px;}
.enemyLine{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.enemyCard{border:1px solid var(--line2);background:#090909;min-width:116px;max-width:150px;padding:8px;text-align:center;}
.enemyGlyph{height:46px;margin-bottom:6px;position:relative;}
.enemyGlyph:before{content:"";position:absolute;left:50%;top:6px;width:44px;height:34px;transform:translateX(-50%);border:2px solid var(--line);border-radius:50% 50% 35% 35%;background:#111;box-shadow:0 0 18px #333 inset;}
.enemyGlyph:after{content:"";position:absolute;left:50%;top:28px;width:70px;height:16px;transform:translateX(-50%);border:1px solid var(--line2);border-top:0;}
.enemyName{font-weight:800;font-size:13px;}
.enemyHp{font-size:12px;color:var(--muted);margin-top:3px;}
.partyBox{padding:6px 6px 7px;}
.rowLabel{display:flex;align-items:center;gap:7px;margin:3px 0 5px;color:var(--warn);font-size:12px;letter-spacing:.08em;}
.rowLabel:after{content:"";height:1px;flex:1;background:var(--line2);}
.partyGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-bottom:4px;}
.member{border:1px solid var(--line2);background:#070707;padding:5px;min-width:0;}
.member.down{border-color:#9f5b5b;color:#e5b0b0;background:#120808;}
.member .name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member .line{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member .hp{color:var(--good);}
.member .bad{color:var(--danger);}
.logBox{padding:7px 8px;min-height:114px;max-height:154px;overflow:auto;font-size:13px;background:#060606;scrollbar-width:thin;}
.logLine{padding:2px 0;border-bottom:1px dotted rgba(215,208,178,.18);}
.logLine.turn{color:var(--warn);font-weight:800;margin-top:4px;}
.logLine.reward{color:var(--good);}
.logLine.damage{color:var(--danger);}
.logLine.system{color:var(--muted);}
.actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;padding:8px;background:#050505;border-top:1px solid var(--line2);position:sticky;bottom:0;z-index:4;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px);}
.actions.two{grid-template-columns:repeat(2,minmax(0,1fr));}
.actions.four{grid-template-columns:repeat(2,minmax(0,1fr));}
.actions .wide{grid-column:1 / -1;}
.menuGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
.menuGrid button{min-height:54px;}
.list{display:flex;flex-direction:column;gap:7px;}
.card{border:1px solid var(--line2);background:#080808;padding:8px;}
.card h3{font-size:15px;margin:0 0 5px;color:var(--warn);}
.card p{margin:3px 0;color:var(--muted);font-size:13px;}
.card .buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:7px;}
.tag{display:inline-block;border:1px solid var(--line2);padding:1px 5px;border-radius:999px;font-size:11px;color:var(--muted);margin-right:4px;}
.titleScreen{min-height:100svh;display:flex;flex-direction:column;justify-content:center;padding:18px 8px calc(env(safe-area-inset-bottom,0px) + 18px);}
.logo{border:1px solid var(--line);padding:18px 12px;text-align:center;background:#050505;box-shadow:0 0 30px rgba(215,208,178,.09) inset;margin-bottom:12px;}
.logo h1{font-size:26px;margin:0 0 8px;letter-spacing:.12em;}
.logo p{margin:0;color:var(--muted);font-size:13px;}
.notice{border:1px solid #8c6d2e;color:#f6dc9a;background:#160f03;padding:8px;margin-bottom:8px;font-size:13px;}
hr.sep{border:0;border-top:1px solid var(--line2);margin:8px 0;}
@media (max-width:370px){
  #app{padding-left:6px;padding-right:6px;}
  .member .name{font-size:12px;}
  .member .line{font-size:11px;}
  button{font-size:14px;padding-left:6px;padding-right:6px;}
  .logBox{font-size:12px;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
'use strict';

/* =========================================================
   定数定義
========================================================= */
const SAVE_KEY = 'classic_dungeon_rpg_single_html_v02';
const SAVE_VERSION = 2;
const DIRS = [
  {id:'N', label:'北', dx:0, dy:-1},
  {id:'E', label:'東', dx:1, dy:0},
  {id:'S', label:'南', dx:0, dy:1},
  {id:'W', label:'西', dx:-1, dy:0}
];
const SCREEN_LABELS = {
  title:'表題', town:'街', dungeon:'地下1階', battle:'戦闘', inn:'宿屋', shop:'商店', appraisal:'鑑定所', party:'隊列確認', items:'所持品', reset:'保存初期化'
};

/* =========================================================
   データ定義
========================================================= */
const DATA = {
  classes: {
    '剣士': {hp:6, mp:0, atk:2, def:1, role:'front'},
    '盾役': {hp:7, mp:0, atk:1, def:2, role:'front'},
    '斥候': {hp:4, mp:0, atk:2, def:1, role:'front'},
    '司祭': {hp:3, mp:3, atk:0, def:1, role:'back'},
    '呪術師': {hp:2, mp:4, atk:0, def:0, role:'back'},
    '弓使い': {hp:4, mp:1, atk:2, def:0, role:'back'}
  },
  party: [
    {id:'p1', name:'ロウ', race:'人間', className:'剣士', row:'front', level:1, exp:0, nextExp:18, hp:30, maxHp:30, mp:0, maxMp:0, attack:8, defense:3, status:'正常'},
    {id:'p2', name:'ギル', race:'石人', className:'盾役', row:'front', level:1, exp:0, nextExp:20, hp:34, maxHp:34, mp:0, maxMp:0, attack:6, defense:5, status:'正常'},
    {id:'p3', name:'ナギ', race:'小人', className:'斥候', row:'front', level:1, exp:0, nextExp:17, hp:25, maxHp:25, mp:0, maxMp:0, attack:7, defense:2, status:'正常'},
    {id:'p4', name:'セナ', race:'ノーム', className:'司祭', row:'back', level:1, exp:0, nextExp:18, hp:22, maxHp:22, mp:12, maxMp:12, attack:4, defense:2, status:'正常'},
    {id:'p5', name:'ミナ', race:'森人', className:'呪術師', row:'back', level:1, exp:0, nextExp:18, hp:18, maxHp:18, mp:16, maxMp:16, attack:3, defense:1, status:'正常'},
    {id:'p6', name:'ライ', race:'獣人', className:'弓使い', row:'back', level:1, exp:0, nextExp:19, hp:23, maxHp:23, mp:5, maxMp:5, attack:6, defense:2, status:'正常'}
  ],
  enemies: {
    dustRat: {id:'dustRat', name:'灰鼠', hp:12, attack:4, defense:1, exp:5, gold:6},
    boneWalker: {id:'boneWalker', name:'骨まとう歩兵', hp:18, attack:6, defense:2, exp:8, gold:9},
    caveMite: {id:'caveMite', name:'穴這い虫', hp:10, attack:5, defense:0, exp:4, gold:4},
    crackedGuard: {id:'crackedGuard', name:'罅割れ番人', hp:26, attack:8, defense:3, exp:14, gold:16},
    blackMoss: {id:'blackMoss', name:'黒苔の塊', hp:22, attack:5, defense:4, exp:10, gold:10},
    lanternSkull: {id:'lanternSkull', name:'灯り頭蓋', hp:16, attack:7, defense:1, exp:9, gold:12}
  },
  enemyGroups: [
    ['dustRat','dustRat'],
    ['caveMite','dustRat'],
    ['boneWalker'],
    ['blackMoss'],
    ['lanternSkull','caveMite'],
    ['crackedGuard']
  ],
  items: {
    herb: {id:'herb', name:'傷薬', unidentifiedName:'小さな包み', type:'consumable', price:28, description:'負傷者1人のHPを18回復する。', unique:false, effect:{kind:'heal', amount:18}},
    clearWater: {id:'clearWater', name:'澄み水', unidentifiedName:'封じた小瓶', type:'consumable', price:34, description:'術者1人のMPを8回復する。', unique:false, effect:{kind:'mp', amount:8}},
    guardCharm: {id:'guardCharm', name:'守り札', unidentifiedName:'折れた札', type:'consumable', price:40, description:'次の戦闘中、全員の守りを少し固める。', unique:false, effect:{kind:'guardCharm', amount:1}},
    returnCord: {id:'returnCord', name:'帰還の紐', unidentifiedName:'古い紐', type:'consumable', price:55, description:'迷宮から街へ戻る。', unique:false, effect:{kind:'returnTown', amount:1}},
    oldDagger: {id:'oldDagger', name:'古びた短剣', unidentifiedName:'刃物らしきもの', type:'trinket', price:22, description:'売却用の古い短剣。', unique:false, effect:null},
    copperCoin: {id:'copperCoin', name:'銅貨束', unidentifiedName:'重い小袋', type:'trinket', price:18, description:'古い銅貨の束。', unique:false, effect:null},
    moonNeedle: {id:'moonNeedle', name:'薄月の針剣', unidentifiedName:'曇った短剣', type:'unique', price:140, description:'淡く光る細身の剣。固有品。', unique:true, effect:{kind:'record'}},
    dawnRing: {id:'dawnRing', name:'暁の銅環', unidentifiedName:'錆びた指輪', type:'unique', price:120, description:'内側に日の輪が刻まれた指輪。固有品。', unique:true, effect:{kind:'record'}},
    muteTablet: {id:'muteTablet', name:'沈黙の石板', unidentifiedName:'罅割れた石板', type:'unique', price:160, description:'読めない記号が走る石板。固有品。', unique:true, effect:{kind:'record'}},
    duskBox: {id:'duskBox', name:'夕闇の銀箱', unidentifiedName:'銀の小箱', type:'unique', price:180, description:'鍵穴のない小箱。固有品。', unique:true, effect:{kind:'record'}},
    hollowAmulet: {id:'hollowAmulet', name:'空洞の護符', unidentifiedName:'黒ずんだ護符', type:'unique', price:150, description:'軽すぎる護符。固有品。', unique:true, effect:{kind:'record'}}
  },
  shop: ['herb','clearWater','guardCharm','returnCord'],
  dungeon: {
    floorId:'B1', name:'地下1階', start:{x:1,y:7,dir:0},
    rows:[
      '#########',
      '#...#...#',
      '#.#.#.#.#',
      '#.#...#.#',
      '#.###.#.#',
      '#...#...#',
      '###.#.###',
      '#.......#',
      '#########'
    ],
    chests: {
      '3,5': {id:'chest_a', opened:false, gold:16, item:'herb', unidentified:'dawnRing'},
      '7,1': {id:'chest_b', opened:false, gold:24, item:'oldDagger', unidentified:'moonNeedle'},
      '5,3': {id:'chest_c', opened:false, gold:18, item:'clearWater', unidentified:'muteTablet'},
      '1,1': {id:'chest_d', opened:false, gold:28, item:'guardCharm', unidentified:'duskBox'},
      '7,5': {id:'chest_e', opened:false, gold:20, item:'copperCoin', unidentified:'hollowAmulet'}
    },
    strongerZones: ['7,1','5,3','7,5']
  }
};

/* =========================================================
   状態管理
========================================================= */
let state = null;
let lastNotice = '';
const app = document.getElementById('app');

function clone(obj){ return JSON.parse(JSON.stringify(obj)); }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function dir(){ return DIRS[state.dungeon.dir]; }
function keyOf(x,y){ return x + ',' + y; }
function aliveParty(){ return state.party.filter(p => p.hp > 0); }
function frontAlive(){ return state.party.filter(p => p.row === 'front' && p.hp > 0); }
function backAlive(){ return state.party.filter(p => p.row === 'back' && p.hp > 0); }
function firstAliveEnemy(){ return state.combat ? state.combat.enemies.find(e => e.hp > 0) : null; }
function isWall(x,y){
  const rows = DATA.dungeon.rows;
  if(y < 0 || y >= rows.length || x < 0 || x >= rows[y].length) return true;
  return rows[y][x] === '#';
}
function inDungeon(){ return state && state.screen === 'dungeon'; }

function createItem(templateId, identified){
  const base = DATA.items[templateId];
  return {uid:'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,7), templateId, identified:!!identified, unique:!!base.unique};
}
function displayItem(item){
  const base = DATA.items[item.templateId];
  if(!base) return {name:'不明な品', desc:'定義のない品。', price:0, unique:false, type:'unknown'};
  return {
    name:item.identified ? base.name : base.unidentifiedName,
    desc:item.identified ? base.description : '正体はまだ分からない。鑑定所で調べられる。',
    price:item.identified ? base.price : Math.max(5, Math.floor(base.price * 0.15)),
    unique:base.unique,
    type:base.type,
    effect:base.effect
  };
}
function createNewState(){
  const party = clone(DATA.party);
  return {
    version:SAVE_VERSION,
    screen:'title',
    gold:90,
    party,
    inventory:[createItem('herb', true), createItem('clearWater', true)],
    catalog:{},
    dungeon:{floorId:'B1', x:DATA.dungeon.start.x, y:DATA.dungeon.start.y, dir:DATA.dungeon.start.dir, visited:{}, openedChests:{}},
    combat:null,
    flags:{guardCharm:false},
    logs:[],
    createdAt:new Date().toISOString()
  };
}
function addLog(text, kind){
  if(!state) return;
  const lines = Array.isArray(text) ? text : [text];
  lines.forEach(line => {
    state.logs.push({text:String(line), kind:kind || 'normal', at:Date.now()});
  });
  if(state.logs.length > 180){ state.logs.splice(0, state.logs.length - 180); }
}
function addTurnHeader(label){ addLog('【' + state.combat.turn + 'ターン目：' + label + '】','turn'); }

/* =========================================================
   保存処理
========================================================= */
function validateSave(obj){
  if(!obj || typeof obj !== 'object') return false;
  if(obj.version !== SAVE_VERSION) return false;
  if(!Array.isArray(obj.party) || obj.party.length !== 6) return false;
  if(!Array.isArray(obj.inventory)) return false;
  if(!obj.dungeon || typeof obj.dungeon.x !== 'number' || typeof obj.dungeon.y !== 'number' || typeof obj.dungeon.dir !== 'number') return false;
  if(isWall(obj.dungeon.x,obj.dungeon.y)) return false;
  if(!obj.logs || !Array.isArray(obj.logs)) obj.logs = [];
  if(!obj.catalog || typeof obj.catalog !== 'object') obj.catalog = {};
  if(!obj.flags || typeof obj.flags !== 'object') obj.flags = {guardCharm:false};
  if(typeof obj.gold !== 'number' || obj.gold < 0) obj.gold = 0;
  return true;
}
function saveGame(){
  if(!state) return;
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
  catch(e){ addLog('保存に失敗した。端末の保存領域を確認。','damage'); }
}
function hasSave(){
  try{ return !!localStorage.getItem(SAVE_KEY); }catch(e){ return false; }
}
function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw){ lastNotice = '保存データはまだありません。'; return false; }
    const obj = JSON.parse(raw);
    if(!validateSave(obj)){ lastNotice = '保存データを読み込めませんでした。新規開始または初期化を選んでください。'; return false; }
    state = obj;
    if(!SCREEN_LABELS[state.screen] || state.screen === 'battle') state.screen = 'town';
    state.combat = null;
    addLog('保存データから再開した。','system');
    return true;
  }catch(e){
    lastNotice = '保存データが壊れています。停止せず、タイトルへ戻しました。';
    return false;
  }
}
function clearSave(){
  try{ localStorage.removeItem(SAVE_KEY); }catch(e){}
  state = null;
  lastNotice = '保存データを初期化した。';
}

/* =========================================================
   迷宮処理
========================================================= */
function enterDungeon(){
  state.screen = 'dungeon';
  state.dungeon.x = DATA.dungeon.start.x;
  state.dungeon.y = DATA.dungeon.start.y;
  state.dungeon.dir = DATA.dungeon.start.dir;
  state.dungeon.visited[keyOf(state.dungeon.x,state.dungeon.y)] = true;
  addLog('地下1階へ入った。','system');
  saveGame(); render();
}
function returnTown(reason){
  state.screen = 'town';
  state.combat = null;
  state.dungeon.x = DATA.dungeon.start.x;
  state.dungeon.y = DATA.dungeon.start.y;
  state.dungeon.dir = DATA.dungeon.start.dir;
  addLog(reason || '街へ戻った。','system');
  saveGame(); render();
}
function turn(delta){
  state.dungeon.dir = (state.dungeon.dir + delta + 4) % 4;
  addLog(dir().label + 'を向いた。','system');
  saveGame(); render();
}
function move(step){
  const d = dir();
  const nx = state.dungeon.x + d.dx * step;
  const ny = state.dungeon.y + d.dy * step;
  if(isWall(nx,ny)){
    addLog('壁に阻まれた。','system');
    saveGame(); render();
    return;
  }
  state.dungeon.x = nx;
  state.dungeon.y = ny;
  state.dungeon.visited[keyOf(nx,ny)] = true;
  addLog('一歩進んだ。現在地 ' + nx + ',' + ny + '。','system');
  const stronger = DATA.dungeon.strongerZones.includes(keyOf(nx,ny));
  const chance = stronger ? 0.34 : 0.18;
  if(Math.random() < chance){ startEncounter(stronger); return; }
  saveGame(); render();
}
function inspect(){
  const k = keyOf(state.dungeon.x,state.dungeon.y);
  const chest = DATA.dungeon.chests[k];
  if(chest && !state.dungeon.openedChests[chest.id]){
    state.dungeon.openedChests[chest.id] = true;
    state.gold += chest.gold;
    if(chest.item) state.inventory.push(createItem(chest.item, true));
    if(chest.unidentified) state.inventory.push(createItem(chest.unidentified, false));
    addLog(['箱を開けた。','金 ' + chest.gold + ' を得た。', DATA.items[chest.item].name + 'を得た。','未鑑定品「' + DATA.items[chest.unidentified].unidentifiedName + '」を得た。'],'reward');
    saveGame(); render();
    return;
  }
  addLog('足元と壁を調べた。敵が現れた。','system');
  startEncounter(DATA.dungeon.strongerZones.includes(k));
}

/* =========================================================
   戦闘処理
========================================================= */
function cloneEnemy(id, index){
  const e = clone(DATA.enemies[id]);
  e.uid = id + '_' + index + '_' + Math.random().toString(36).slice(2,5);
  e.maxHp = e.hp;
  return e;
}
function startEncounter(stronger){
  const groupIds = stronger ? pick([['crackedGuard'], ['lanternSkull','boneWalker'], ['blackMoss','caveMite']]) : pick(DATA.enemyGroups.slice(0,5));
  state.combat = {turn:1, enemies:groupIds.map(cloneEnemy), defending:false};
  state.screen = 'battle';
  addLog('敵が現れた。','turn');
  state.combat.enemies.forEach(e => addLog(e.name + '　HP' + e.hp,'system'));
  saveGame(); render();
}
function partyAttack(){
  if(!state.combat) return;
  addTurnHeader('攻撃');
  state.combat.defending = false;
  aliveParty().forEach(p => {
    const target = firstAliveEnemy();
    if(!target) return;
    let base = p.attack;
    let note = '';
    if(p.row === 'back' && p.className !== '弓使い') { base = Math.max(1, Math.floor(base * 0.55)); note = '後衛から'; }
    if(p.row === 'back' && p.className === '弓使い') { note = '後衛から矢を放ち、'; }
    const miss = Math.random() < (p.row === 'back' && p.className !== '弓使い' ? 0.28 : 0.12);
    if(miss){ addLog(p.name + 'の攻撃は外れた。'); return; }
    const damage = Math.max(1, base + rand(0,4) - target.defense);
    target.hp = Math.max(0, target.hp - damage);
    addLog(note + p.name + 'の攻撃。' + target.name + 'に' + damage + 'ダメージ。');
    if(target.hp <= 0) addLog(target.name + 'を倒した。','reward');
  });
  if(checkVictory()) return;
  enemyTurn();
}
function partyDefend(){
  if(!state.combat) return;
  addTurnHeader('防御');
  state.combat.defending = true;
  addLog('前衛が盾を上げ、後衛は身を低くした。','system');
  enemyTurn();
}
function partyMagic(){
  if(!state.combat) return;
  addTurnHeader('魔法');
  state.combat.defending = false;
  let acted = false;
  const priest = state.party.find(p => p.className === '司祭' && p.hp > 0);
  if(priest && priest.mp >= 3){
    const wounded = state.party.filter(p => p.hp > 0 && p.hp < p.maxHp).sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp))[0];
    if(wounded){
      priest.mp -= 3;
      const heal = rand(9,15) + priest.level;
      wounded.hp = Math.min(wounded.maxHp, wounded.hp + heal);
      addLog(priest.name + 'が癒しを唱えた。' + wounded.name + 'のHP +' + heal + '。','reward');
      acted = true;
    }
  }
  const mage = state.party.find(p => p.className === '呪術師' && p.hp > 0);
  if(mage && mage.mp >= 4){
    mage.mp -= 4;
    state.combat.enemies.filter(e => e.hp > 0).forEach(e => {
      const damage = rand(5,9) + mage.level;
      e.hp = Math.max(0, e.hp - damage);
      addLog(mage.name + 'の火花。' + e.name + 'に' + damage + 'ダメージ。');
      if(e.hp <= 0) addLog(e.name + 'を倒した。','reward');
    });
    acted = true;
  }
  if(!acted) addLog('唱えられる術がなかった。','system');
  if(checkVictory()) return;
  enemyTurn();
}
function partyFlee(){
  if(!state.combat) return;
  addTurnHeader('逃走');
  const chance = frontAlive().length > 0 ? 0.58 : 0.35;
  if(Math.random() < chance){
    addLog('隊列を崩さず退いた。','system');
    state.screen = 'dungeon';
    state.combat = null;
    saveGame(); render();
  }else{
    addLog('逃げ切れなかった。','damage');
    enemyTurn();
  }
}
function chooseEnemyTarget(){
  const front = frontAlive();
  if(front.length && Math.random() < 0.78) return pick(front);
  const all = aliveParty();
  return all.length ? pick(all) : null;
}
function enemyTurn(){
  if(!state.combat) return;
  const charmBonus = state.flags.guardCharm ? 1 : 0;
  state.combat.enemies.filter(e => e.hp > 0).forEach(e => {
    const target = chooseEnemyTarget();
    if(!target) return;
    let damage = Math.max(1, e.attack + rand(0,3) - target.defense - charmBonus);
    if(state.combat.defending) damage = Math.max(1, Math.ceil(damage * 0.45));
    target.hp = Math.max(0, target.hp - damage);
    addLog(e.name + 'の攻撃。' + target.name + 'は' + damage + 'ダメージを受けた。','damage');
    if(target.hp <= 0 && target.status !== '戦闘不能'){
      target.status = '戦闘不能';
      addLog(target.name + 'は倒れた。','damage');
    }
  });
  state.flags.guardCharm = false;
  if(checkDefeat()) return;
  state.combat.turn += 1;
  saveGame(); render();
}
function checkVictory(){
  if(!state.combat) return false;
  if(state.combat.enemies.some(e => e.hp > 0)) return false;
  const rewardExp = state.combat.enemies.reduce((s,e)=>s+e.exp,0);
  const rewardGold = state.combat.enemies.reduce((s,e)=>s+e.gold,0) + rand(0,6);
  state.gold += rewardGold;
  state.party.forEach(p => { if(p.hp > 0) p.exp += rewardExp; });
  addLog('敵を倒した。','reward');
  addLog('経験値 ' + rewardExp + ' を得た。','reward');
  addLog('金 ' + rewardGold + ' を得た。','reward');
  const normalDrop = Math.random() < 0.62 ? pick(['herb','oldDagger','copperCoin','clearWater']) : null;
  const uniquePool = ['moonNeedle','dawnRing','muteTablet','duskBox','hollowAmulet'].filter(id => !state.inventory.some(it => it.templateId === id) && !state.catalog[id]);
  const unidDrop = Math.random() < 0.48 && uniquePool.length ? pick(uniquePool) : (Math.random()<0.38 ? pick(['oldDagger','guardCharm']) : null);
  if(normalDrop){ state.inventory.push(createItem(normalDrop, true)); addLog(DATA.items[normalDrop].name + 'を得た。','reward'); }
  if(unidDrop){ state.inventory.push(createItem(unidDrop, false)); addLog('未鑑定品「' + DATA.items[unidDrop].unidentifiedName + '」を得た。','reward'); }
  state.screen = 'dungeon';
  state.combat = null;
  saveGame(); render();
  return true;
}
function checkDefeat(){
  if(aliveParty().length > 0) return false;
  const lost = Math.floor(state.gold / 2);
  state.gold -= lost;
  state.party.forEach(p => { p.hp = 1; p.mp = 0; p.status = '重傷'; });
  addLog('全員が倒れた。街の入口へ運び戻された。','damage');
  addLog('金 ' + lost + ' を失った。','damage');
  state.screen = 'town';
  state.combat = null;
  saveGame(); render();
  return true;
}

/* =========================================================
   施設処理
========================================================= */
function innCost(){ return state.party.reduce((s,p)=>s + 5 + p.level * 3, 0); }
function useInn(){
  const cost = innCost();
  if(state.gold < cost){ addLog('宿代が足りない。必要額 ' + cost + '。','damage'); render(); return; }
  state.gold -= cost;
  addLog('宿代 ' + cost + ' を支払った。','system');
  addLog('全員のHPとMPが回復した。','reward');
  state.party.forEach(p => { p.hp = p.maxHp; p.mp = p.maxMp; p.status = '正常'; });
  let any = false;
  state.party.forEach(p => {
    while(p.exp >= p.nextExp){
      any = true;
      const growth = levelGrowth(p);
      p.level += 1;
      p.maxHp += growth.hp;
      p.maxMp += growth.mp;
      p.attack += growth.atk;
      p.defense += growth.def;
      p.hp = p.maxHp;
      p.mp = p.maxMp;
      p.nextExp = Math.floor(p.nextExp * 1.7 + 16);
      addLog(p.name + 'はLv' + p.level + 'になった。','reward');
      addLog('最大HP +' + growth.hp + ' / 最大MP +' + growth.mp + ' / 攻撃 +' + growth.atk + ' / 防御 +' + growth.def,'reward');
    }
  });
  if(!any) addLog('レベルアップできる者はいなかった。','system');
  saveGame(); render();
}
function levelGrowth(p){
  const c = DATA.classes[p.className] || {hp:3,mp:1,atk:1,def:1};
  return {hp:c.hp + rand(0,2), mp:c.mp + (p.maxMp>0 ? rand(0,1) : 0), atk:c.atk ? rand(0,c.atk) : 0, def:c.def ? rand(0,c.def) : 0};
}
function appraise(uid){
  const item = state.inventory.find(i => i.uid === uid);
  if(!item){ addLog('品物が見つからない。','damage'); render(); return; }
  const base = DATA.items[item.templateId];
  if(item.identified){ addLog('その品はすでに鑑定済み。','system'); render(); return; }
  const fee = Math.max(8, Math.floor(base.price * 0.18));
  if(state.gold < fee){ addLog('鑑定料が足りない。必要額 ' + fee + '。','damage'); render(); return; }
  state.gold -= fee;
  item.identified = true;
  if(base.unique) state.catalog[base.id] = true;
  addLog('鑑定料 ' + fee + ' を支払った。','system');
  addLog('「' + base.unidentifiedName + '」は「' + base.name + '」だった。','reward');
  if(base.unique) addLog('固有品として記録された。','reward');
  saveGame(); render();
}
function buyItem(id){
  const base = DATA.items[id];
  if(!base) return;
  if(state.gold < base.price){ addLog(base.name + 'を買う金が足りない。','damage'); render(); return; }
  state.gold -= base.price;
  state.inventory.push(createItem(id, true));
  addLog(base.name + 'を購入した。金 -' + base.price + '。','reward');
  saveGame(); render();
}
function sellItem(uid){
  const index = state.inventory.findIndex(i => i.uid === uid);
  if(index < 0){ addLog('売る品が見つからない。','damage'); render(); return; }
  const item = state.inventory[index];
  const view = displayItem(item);
  const value = Math.max(1, Math.floor(view.price * 0.5));
  state.inventory.splice(index,1);
  state.gold += value;
  addLog(view.name + 'を売却した。金 +' + value + '。','reward');
  saveGame(); render();
}
function useItem(uid){
  const index = state.inventory.findIndex(i => i.uid === uid);
  if(index < 0){ addLog('使う品が見つからない。','damage'); render(); return; }
  const item = state.inventory[index];
  const base = DATA.items[item.templateId];
  if(!item.identified){ addLog('未鑑定品は使えない。','damage'); render(); return; }
  if(!base.effect || base.type !== 'consumable'){ addLog(base.name + 'はここでは使えない。','system'); render(); return; }
  let consumed = false;
  if(base.effect.kind === 'heal'){
    const target = state.party.filter(p => p.hp > 0 && p.hp < p.maxHp).sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp))[0];
    if(!target){ addLog('傷薬を使う必要はない。','system'); render(); return; }
    target.hp = Math.min(target.maxHp, target.hp + base.effect.amount);
    addLog(base.name + 'を使った。' + target.name + 'のHP +' + base.effect.amount + '。','reward');
    consumed = true;
  }
  if(base.effect.kind === 'mp'){
    const target = state.party.filter(p => p.maxMp > 0 && p.mp < p.maxMp).sort((a,b)=>(a.mp/a.maxMp)-(b.mp/b.maxMp))[0];
    if(!target){ addLog('澄み水を使う必要はない。','system'); render(); return; }
    target.mp = Math.min(target.maxMp, target.mp + base.effect.amount);
    addLog(base.name + 'を使った。' + target.name + 'のMP +' + base.effect.amount + '。','reward');
    consumed = true;
  }
  if(base.effect.kind === 'guardCharm'){
    state.flags.guardCharm = true;
    addLog(base.name + 'を掲げた。次の戦闘で守りが少し固まる。','reward');
    consumed = true;
  }
  if(base.effect.kind === 'returnTown'){
    state.inventory.splice(index,1);
    returnTown(base.name + 'を使い、街へ戻った。');
    return;
  }
  if(consumed){ state.inventory.splice(index,1); saveGame(); render(); }
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function render(){
  if(!state){ renderTitle(); return; }
  if(state.screen === 'title'){ renderTitle(); return; }
  const header = renderHeader();
  let main = '';
  let actions = [];
  if(state.screen === 'town'){ main = renderTown(); actions = []; }
  if(state.screen === 'dungeon'){ main = renderDungeon(); actions = dungeonActions(); }
  if(state.screen === 'battle'){ main = renderBattle(); actions = battleActions(); }
  if(state.screen === 'inn'){ main = renderInn(); actions = [{label:'泊まる',action:'innRest'}, {label:'街へ戻る',action:'town'}]; }
  if(state.screen === 'shop'){ main = renderShop(); actions = [{label:'街へ戻る',action:'town'}]; }
  if(state.screen === 'appraisal'){ main = renderAppraisal(); actions = [{label:'街へ戻る',action:'town'}]; }
  if(state.screen === 'party'){ main = renderPartyDetail(); actions = [{label:'街へ戻る',action:'town'}]; }
  if(state.screen === 'items'){ main = renderItems(); actions = [{label:'街へ戻る',action:'town'}]; }
  if(state.screen === 'reset'){ main = renderReset(); actions = [{label:'初期化する',action:'clearSave'}, {label:'街へ戻る',action:'town'}]; }
  app.innerHTML = header + '<main class="main">' + main + '</main>' + renderPartySummary() + renderLog() + renderActions(actions);
  if(state.screen === 'dungeon') drawDungeon();
  requestAnimationFrame(scrollLogToBottom);
}

  const canContinue = hasSave();
  app.innerHTML = '<div class="titleScreen">' +
    (lastNotice ? '<div class="notice">' + escapeHtml(lastNotice) + '</div>' : '') +
    '<div class="logo"><h1>地下環廊の踏査隊</h1><p>単体HTMLで動作する古典的3DダンジョンRPG土台版</p></div>' +
    '<div class="menuGrid">' +
      '<button data-action="newGame">新規開始</button>' +
      '<button data-action="loadGame" ' + (canContinue?'':'disabled') + '>続きから</button>' +
      '<button data-action="clearSave">保存初期化</button>' +
    '</div>' +
    '<div class="panel frame" style="margin-top:12px"><p class="subtle">外部画像・外部フォント・外部CDNは使わない。保存はこのブラウザのLocalStorageを使う。</p></div>' +
  '</div>';
}

function renderPartyDetail(){
  const cards = state.party.map(p => '<div class="card"><h3>' + escapeHtml(p.name) + ' <span class="tag">' + (p.row==='front'?'前衛':'後衛') + '</span></h3><div class="kv"><b>種族</b><span>' + escapeHtml(p.race) + '</span><b>職業</b><span>' + escapeHtml(p.className) + '</span><b>Lv</b><span>' + p.level + '</span><b>経験値</b><span>' + p.exp + ' / 次 ' + p.nextExp + '</span><b>HP</b><span>' + p.hp + ' / ' + p.maxHp + '</span><b>MP</b><span>' + p.mp + ' / ' + p.maxMp + '</span><b>攻撃</b><span>' + p.attack + '</span><b>防御</b><span>' + p.defense + '</span><b>状態</b><span>' + escapeHtml(p.status) + '</span></div></div>').join('');

function renderItems(){

/* =========================================================
   疑似3D表示
========================================================= */
function drawDungeon(){
  const canvas = document.getElementById('dungeonCanvas');
  if(!canvas || !canvas.getContext) return;
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const w = Math.max(280, Math.floor(rect.width * dpr));
  const h = Math.max(180, Math.floor(rect.height * dpr));
  if(canvas.width !== w) canvas.width = w;
  if(canvas.height !== h) canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#020202'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = '#d7d0b2'; ctx.lineWidth = Math.max(1,dpr);
  ctx.fillStyle = '#080808';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(w,0); ctx.lineTo(w*0.55,h*0.45); ctx.lineTo(w*0.45,h*0.45); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,h); ctx.lineTo(w,h); ctx.lineTo(w*0.55,h*0.55); ctx.lineTo(w*0.45,h*0.55); ctx.closePath(); ctx.fill(); ctx.stroke();
  const rects = [
    {x1:w*.04,y1:h*.08,x2:w*.96,y2:h*.92},
    {x1:w*.17,y1:h*.19,x2:w*.83,y2:h*.81},
    {x1:w*.30,y1:h*.30,x2:w*.70,y2:h*.70},
    {x1:w*.41,y1:h*.39,x2:w*.59,y2:h*.61}
  ];
  const basis = directionBasis();
  let blockedAt = null;
  for(let depth=1; depth<=4; depth++){
    const cx = state.dungeon.x + basis.f.dx * depth;
    const cy = state.dungeon.y + basis.f.dy * depth;
    if(isWall(cx,cy)){ blockedAt = depth; break; }
  }
  for(let i=0; i<rects.length; i++){
    const r = rects[i];
    ctx.strokeStyle = i%2 ? '#8c8465' : '#d7d0b2';
    ctx.strokeRect(r.x1,r.y1,r.x2-r.x1,r.y2-r.y1);
    if(i>0){
      const p = rects[i-1];
      line(ctx,p.x1,p.y1,r.x1,r.y1); line(ctx,p.x2,p.y1,r.x2,r.y1); line(ctx,p.x1,p.y2,r.x1,r.y2); line(ctx,p.x2,p.y2,r.x2,r.y2);
    }
  }
  for(let depth=1; depth<=4; depth++){
    const hereX = state.dungeon.x + basis.f.dx * (depth-1);
    const hereY = state.dungeon.y + basis.f.dy * (depth-1);
    if(!isWall(hereX + basis.l.dx, hereY + basis.l.dy)) drawSideOpening(ctx, rects[depth-1], 'left');
    if(!isWall(hereX + basis.r.dx, hereY + basis.r.dy)) drawSideOpening(ctx, rects[depth-1], 'right');
  }
  if(blockedAt){
    const r = rects[Math.min(blockedAt-1, rects.length-1)];
    ctx.fillStyle = '#101010'; ctx.fillRect(r.x1,r.y1,r.x2-r.x1,r.y2-r.y1);
    ctx.strokeStyle = '#efe6c4'; ctx.strokeRect(r.x1,r.y1,r.x2-r.x1,r.y2-r.y1);
    ctx.strokeStyle = '#5f5840';
    for(let k=1;k<5;k++){ const yy = r.y1 + (r.y2-r.y1)*k/5; line(ctx,r.x1,yy,r.x2,yy); }
    for(let k=1;k<4;k++){ const xx = r.x1 + (r.x2-r.x1)*k/4; line(ctx,xx,r.y1,xx,r.y2); }
  }
  const chest = DATA.dungeon.chests[keyOf(state.dungeon.x,state.dungeon.y)];
  if(chest && !state.dungeon.openedChests[chest.id]){
    ctx.strokeStyle = '#f4d48a'; ctx.fillStyle = '#181408';
    const cw=w*.18,ch=h*.09,cx=w*.41,cy=h*.69;
    ctx.fillRect(cx,cy,cw,ch); ctx.strokeRect(cx,cy,cw,ch); line(ctx,cx,cy+ch*.45,cx+cw,cy+ch*.45);
  }
  ctx.fillStyle = '#d7d0b2'; ctx.font = Math.floor(12*dpr) + 'px sans-serif';
  ctx.fillText(DATA.dungeon.name + '  ' + state.dungeon.x + ',' + state.dungeon.y + '  ' + dir().label, 10*dpr, 18*dpr);
}
function directionBasis(){
  const f = dir();
  const l = DIRS[(state.dungeon.dir + 3) % 4];
  const r = DIRS[(state.dungeon.dir + 1) % 4];
  return {f,l,r};
}
function drawSideOpening(ctx, r, side){
  const midY = (r.y1 + r.y2) / 2;
  ctx.strokeStyle = '#efe6c4';
  if(side === 'left'){
    line(ctx,r.x1,r.y1,r.x1 + (r.x2-r.x1)*.16, midY);
    line(ctx,r.x1,r.y2,r.x1 + (r.x2-r.x1)*.16, midY);
  }else{
    line(ctx,r.x2,r.y1,r.x2 - (r.x2-r.x1)*.16, midY);
    line(ctx,r.x2,r.y2,r.x2 - (r.x2-r.x1)*.16, midY);
  }
}
function line(ctx,x1,y1,x2,y2){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }

/* =========================================================
   イベント処理
========================================================= */
const handlers = {
  newGame(){ state = createNewState(); state.screen = 'town'; lastNotice = ''; addLog('踏査隊を結成した。','system'); addLog('街で準備し、地下環廊へ向かう。','system'); saveGame(); render(); },
  loadGame(){ if(loadGame()){ lastNotice=''; render(); } else { state = null; renderTitle(); } },
  clearSave(){ clearSave(); renderTitle(); },
  resetScreen(){ state.screen = 'reset'; render(); },
  town(){ state.screen = 'town'; saveGame(); render(); },
  enterDungeon,
  inn(){ state.screen = 'inn'; render(); },
  shop(){ state.screen = 'shop'; render(); },
  appraisal(){ state.screen = 'appraisal'; render(); },
  party(){ state.screen = 'party'; render(); },
  items(){ state.screen = 'items'; render(); },
  innRest:useInn,
  turnLeft(){ if(inDungeon()) turn(-1); },
  turnRight(){ if(inDungeon()) turn(1); },
  forward(){ if(inDungeon()) move(1); },
  back(){ if(inDungeon()) move(-1); },
  inspect(){ if(inDungeon()) inspect(); },
  returnTown(){ if(state) returnTown('街へ戻った。'); },
  attack:partyAttack,
  defend:partyDefend,
  magic:partyMagic,
  flee:partyFlee,
  buy(btn){ buyItem(btn.dataset.id); },
  sell(btn){ sellItem(btn.dataset.uid); },
  appraise(btn){ appraise(btn.dataset.uid); },
  useItem(btn){ useItem(btn.dataset.uid); }
};
document.addEventListener('click', function(ev){
  const btn = ev.target.closest('[data-action]');
  if(!btn || btn.disabled) return;
  const fn = handlers[btn.dataset.action];
  if(fn) fn(btn);
});
window.addEventListener('resize', function(){ if(state && state.screen === 'dungeon') drawDungeon(); });

/* =========================================================
   検査用公開API（ゲーム画面からは使わない）
========================================================= */
window.__classicDungeonRpgDebug = {
  newGame:handlers.newGame,
  getState:function(){ return state; },
  forceBattle:function(){ startEncounter(false); },
  winNow:function(){ if(state && state.combat){ state.combat.enemies.forEach(e=>e.hp=0); checkVictory(); } },
  setGold:function(g){ if(state){ state.gold = g; saveGame(); render(); } },
  giveExp:function(x){ if(state){ state.party.forEach(p=>p.exp+=x); saveGame(); render(); } },
  corruptSave:function(){ localStorage.setItem(SAVE_KEY, '{broken json'); }
};

renderTitle();
})();
</script>
