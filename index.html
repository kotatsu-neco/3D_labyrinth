<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>灰の目録 3Dダンジョン試作 v12</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="style.css?v=20260609-v12" />
</head>
<body>
  <main class="app-shell">
    <section class="viewport-panel" aria-label="3Dダンジョン表示">
      <canvas id="dungeonCanvas" aria-label="WebGL 3D dungeon viewport"></canvas>
      <div class="hud hud-top">
        <div class="hud-title">灰の目録 / 3Dダンジョン試作 v12</div>
        <div id="positionText" class="hud-position">B1F x0 y0 N</div>
      </div>
      <div id="messageLog" class="message-log" aria-live="polite"></div>
    </section>

    <section class="party-panel wizardry-party-panel" aria-label="パーティ状態">
      <div class="explore-party-table" aria-label="パーティ状態一覧">
        <div class="explore-party-head"><span>NAME</span><span>CLASS</span><span>HITS</span><span>MAGIC</span><span>STATUS</span></div>
        <div class="explore-party-row"><span>アデル</span><span>FIG</span><span>34/34</span><span>0/0</span><span>OK</span></div>
        <div class="explore-party-row"><span>ミラ</span><span>THI</span><span>28/28</span><span>0/0</span><span>OK</span></div>
        <div class="explore-party-row"><span>ガルド</span><span>FIG</span><span>41/41</span><span>0/0</span><span>OK</span></div>
        <div class="explore-party-row"><span>セリン</span><span>PRI</span><span>18/18</span><span>18/18</span><span>OK</span></div>
        <div class="explore-party-row"><span>ロウ</span><span>MAG</span><span>12/12</span><span>12/12</span><span>OK</span></div>
        <div class="explore-party-row"><span>ネネ</span><span>BIS</span><span>21/21</span><span>21/21</span><span>OK</span></div>
      </div>
    </section>

    <section class="command-panel" aria-label="操作">
      <div class="action-row">
        <button id="campBtn" class="cmd-btn">キャンプ</button>
        <button id="inspectBtn" class="cmd-btn primary">調べる</button>
        <button id="formationBtn" class="cmd-btn">隊列</button>
      </div>
      <div class="move-pad" aria-label="移動操作">
        <button id="turnLeftBtn" class="move-btn side">←</button>
        <button id="forwardBtn" class="move-btn main">↑</button>
        <button id="turnRightBtn" class="move-btn side">→</button>
        <button id="backBtn" class="move-btn back">↓</button>
      </div>
      <div class="debug-row three">
        <button id="resetBtn" class="small-btn">初期位置</button>
        <button id="mapBtn" class="small-btn">簡易マップ</button>
        <button id="detectTrapBtn" class="small-btn">罠検知</button>
      </div>
    </section>
  </main>
  <script src="app.js?v=20260609-v12"></script>
</body>
</html>
