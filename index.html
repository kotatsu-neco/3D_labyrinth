<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>黒壁の地下廊 v0.1</title>
<style>
:root{
  color-scheme: dark;
  --bg:#050505;
  --panel:#0b0b0b;
  --line:#d8d8d8;
  --muted:#a8a8a8;
  --text:#f2f2f2;
  --warn:#e7cf88;
  --bad:#f0a0a0;
  --good:#bce8bc;
  --button:#111;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);overflow-x:hidden;}
body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
  line-height:1.42;
  -webkit-text-size-adjust:100%;
}
#app{width:100%;max-width:540px;margin:0 auto;padding:10px 10px 18px;}
.frame{border:1px solid var(--line);background:var(--panel);padding:10px;margin:8px 0;}
.header{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;}
.title{font-weight:700;letter-spacing:.08em;font-size:18px;}
.sub{color:var(--muted);font-size:13px;}
.statusLine{font-size:13px;text-align:right;color:var(--muted);white-space:pre-line;}
.mainTitle{font-size:25px;letter-spacing:.16em;text-align:center;margin:14px 0 6px;}
.center{text-align:center;}
.note{color:var(--muted);font-size:14px;}
.warn{color:var(--warn);}
.bad{color:var(--bad);}
.good{color:var(--good);}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
@media(max-width:380px){.grid3{gap:4px}.frame{padding:8px}.title{font-size:16px}}
button{
  min-height:46px;
  border:1px solid var(--line);
  color:var(--text);
  background:var(--button);
  padding:10px 8px;
  font-size:16px;
  border-radius:0;
  width:100%;
  touch-action:manipulation;
}
button:active{background:#242424;transform:translateY(1px);}
button[disabled]{opacity:.45;}
.actions{position:sticky;bottom:0;background:linear-gradient(transparent,var(--bg) 12px,var(--bg));padding-top:14px;padding-bottom:env(safe-area-inset-bottom);}
.actions .grid2,.actions .grid3{margin-top:6px;}
.partyBlock{display:grid;grid-template-columns:1fr;gap:8px;}
.partyRowTitle{font-size:13px;color:var(--muted);margin-bottom:4px;}
.memberGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;}
.member{border:1px solid #777;padding:6px;min-width:0;background:#080808;}
.member .name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member .meta,.member .nums{font-size:12px;color:var(--muted);}
.member .nums{white-space:nowrap;}
.dead{color:var(--bad);}
.log{min-height:92px;max-height:128px;overflow:auto;font-size:13px;color:#e8e8e8;}
.log div{border-bottom:1px dotted #333;padding:2px 0;}
.dungeonView{border:1px solid var(--line);height:230px;background:#000;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
#mazeCanvas{width:100%;height:100%;display:block;background:#000;}
.mazeLabel{position:absolute;left:8px;bottom:6px;font-size:12px;color:#bbb;background:rgba(0,0,0,.65);padding:2px 5px;border:1px solid #555;}
.enemyBox{display:grid;grid-template-columns:1fr;gap:6px;}
.enemyName{font-size:20px;font-weight:700;text-align:center;letter-spacing:.08em;}
.hpbar{height:14px;border:1px solid var(--line);background:#111;overflow:hidden;}
.hpbar span{display:block;height:100%;background:#ddd;}
.list{display:grid;gap:6px;}
.listItem{border:1px solid #777;padding:8px;background:#080808;}
.itemName{font-weight:700;}
.itemDesc{font-size:13px;color:var(--muted);}
.facilityText{font-size:15px;}
.small{font-size:12px;color:var(--muted);}
.hidden{display:none;}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

/* =========================================================
   定数定義
========================================================= */
const CONFIG = {
  saveKey: 'classic_dungeon_single_html_v01_clean_save',
  saveVersion: 1,
  maxLog: 80,
  directions: ['北','東','南','西'],
  dirDelta: [ {x:0,y:-1}, {x:1,y:0}, {x:0,y:1}, {x:-1,y:0} ]
};

const SCREEN = {
  TITLE:'title', TOWN:'town', DUNGEON:'dungeon', BATTLE:'battle',
  INN:'inn', SHOP:'shop', APPRAISAL:'appraisal', PARTY:'party', ITEMS:'items', RESET:'reset'
};

/* =========================================================
   データ定義
========================================================= */
const DATA = {
  races: ['人間','エルフ','ドワーフ','ノーム','獣人'],
  classes: {
    guard: {name:'護衛', hp:30, mp:0, attack:8, defense:5, growth:{hp:7,mp:0,attack:3,defense:2}},
    scout: {name:'斥候', hp:24, mp:0, attack:6, defense:4, growth:{hp:5,mp:0,attack:2,defense:2}},
    priest: {name:'司祭', hp:22, mp:9, attack:4, defense:3, growth:{hp:4,mp:4,attack:1,defense:1}},
    mage: {name:'呪文士', hp:18, mp:14, attack:3, defense:2, growth:{hp:3,mp:6,attack:1,defense:1}},
    duelist: {name:'剣客', hp:27, mp:2, attack:7, defense:4, growth:{hp:6,mp:1,attack:3,defense:1}},
    ranger: {name:'野伏', hp:23, mp:5, attack:6, defense:3, growth:{hp:5,mp:2,attack:2,defense:1}}
  },
  initialParty: [
    {id:'c01', name:'アルド', race:'人間', classKey:'guard', row:'front'},
    {id:'c02', name:'ブラン', race:'ドワーフ', classKey:'duelist', row:'front'},
    {id:'c03', name:'ケイル', race:'獣人', classKey:'scout', row:'front'},
    {id:'c04', name:'リュカ', race:'エルフ', classKey:'mage', row:'back'},
    {id:'c05', name:'セラ', race:'ノーム', classKey:'priest', row:'back'},
    {id:'c06', name:'ナギ', race:'人間', classKey:'ranger', row:'back'}
  ],
  items: {
    herb: {id:'herb', name:'薬草', unidentifiedName:'薬草', type:'consumable', price:18, unique:false, description:'簡易な治療品。v0.1では売買用の通常品。', effect:{heal:12}},
    draught: {id:'draught', name:'精気水', unidentifiedName:'精気水', type:'consumable', price:34, unique:false, description:'魔力を整える水。v0.1では売買用の通常品。', effect:{mp:5}},
    whetstone: {id:'whetstone', name:'砥石', unidentifiedName:'砥石', type:'tool', price:22, unique:false, description:'刃を整える道具。v0.1では換金可能な通常品。', effect:{}},
    moonDagger: {id:'moonDagger', name:'月欠けの刃', unidentifiedName:'奇妙な短剣', type:'weapon', price:120, unique:true, description:'欠けた月を思わせる細身の刃。', effect:{attack:2}},
    deepRing: {id:'deepRing', name:'深銀の指輪', unidentifiedName:'錆びた指輪', type:'accessory', price:140, unique:true, description:'錆の下から鈍い銀色がのぞく指輪。', effect:{defense:1}},
    nightCharm: {id:'nightCharm', name:'夜番の護符', unidentifiedName:'黒ずんだ護符', type:'accessory', price:160, unique:true, description:'暗所での気配を静める古い護符。', effect:{defense:2}},
    sealedBox: {id:'sealedBox', name:'封光の小箱', unidentifiedName:'銀の小箱', type:'relic', price:180, unique:true, description:'内側に淡い光を封じた小箱。', effect:{}},
    layerTablet: {id:'layerTablet', name:'古層の石板', unidentifiedName:'罅割れた石板', type:'relic', price:200, unique:true, description:'地下の古い区画名が刻まれた石板。', effect:{}},
    ashRod: {id:'ashRod', name:'灰唱えの杖', unidentifiedName:'すすけた杖', type:'weapon', price:150, unique:true, description:'火ではなく灰の気配を帯びた短杖。', effect:{mp:2}}
  },
  shop: ['herb','draught','whetstone'],
  enemies: [
    {id:'rat', name:'石喰い鼠', hp:18, attack:5, defense:1, exp:18, gold:14},
    {id:'bat', name:'黒羽蝙蝠', hp:22, attack:6, defense:2, exp:22, gold:18},
    {id:'crawler', name:'迷路蟲', hp:28, attack:7, defense:3, exp:28, gold:24},
    {id:'bone', name:'骨の衛兵', hp:36, attack:9, defense:4, exp:36, gold:32},
    {id:'beast', name:'地下角獣', hp:44, attack:11, defense:5, exp:46, gold:42},
    {id:'wanderer', name:'泥面の徘徊者', hp:32, attack:8, defense:3, exp:32, gold:28}
  ],
  dungeon: {
    B1: {
      id:'B1', name:'地下1階', start:{x:1,y:1,dir:1},
      map: [
        '#######',
        '#S....#',
        '#.###.#',
        '#...#.#',
        '###.#.#',
        '#.....#',
        '#######'
      ]
    }
  }
};

/* =========================================================
   状態管理
========================================================= */
let state = null;
let titleMessage = '';
let appEl = document.getElementById('app');

function makeCharacter(def){
  const cls = DATA.classes[def.classKey];
  return {
    id:def.id,
    name:def.name,
    race:def.race,
    classKey:def.classKey,
    className:cls.name,
    level:1,
    exp:0,
    nextExp:18,
    hp:cls.hp,
    maxHp:cls.hp,
    mp:cls.mp,
    maxMp:cls.mp,
    attack:cls.attack,
    defense:cls.defense,
    status:'正常',
    row:def.row
  };
}

function createInitialState(){
  const start = DATA.dungeon.B1.start;
  return {
    version:CONFIG.saveVersion,
    screen:SCREEN.TOWN,
    gold:70,
    party:DATA.initialParty.map(makeCharacter),
    inventory:[makeInventoryItem('herb', true), makeInventoryItem('whetstone', true)],
    dungeon:{floor:'B1', x:start.x, y:start.y, dir:start.dir, steps:0},
    battle:null,
    log:['新しい探索隊が編成された。街から行動を開始する。'],
    discoveryIndex:0,
    lastSaveStatus:'未保存'
  };
}

function makeInventoryItem(itemId, identified){
  return {
    instanceId:'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,8),
    itemId:itemId,
    identified:!!identified
  };
}

function aliveMembers(){
  if(!state) return [];
  return state.party.filter(c => c.hp > 0 && c.status !== '戦闘不能');
}

function clamp(num,min,max){ return Math.max(min, Math.min(max, num)); }
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function sample(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function escapeHtml(text){
  return String(text).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

/* =========================================================
   ログ処理
========================================================= */
function addLog(message){
  if(!state) { titleMessage = message; return; }
  state.log.unshift(message);
  state.log = state.log.slice(0, CONFIG.maxLog);
}

/* =========================================================
   保存処理
========================================================= */
function saveGame(){
  if(!state) return false;
  try{
    state.lastSaveStatus = new Date().toLocaleString('ja-JP');
    localStorage.setItem(CONFIG.saveKey, JSON.stringify(state));
    return true;
  }catch(e){
    addLog('保存に失敗した。ブラウザ設定または空き容量を確認する必要がある。');
    return false;
  }
}

function loadGame(){
  try{
    const raw = localStorage.getItem(CONFIG.saveKey);
    if(!raw) return {ok:false, reason:'保存データがない。'};
    const parsed = JSON.parse(raw);
    const checked = validateSave(parsed);
    if(!checked.ok) return checked;
    return {ok:true, state:parsed};
  }catch(e){
    return {ok:false, reason:'保存データが破損している。'};
  }
}

function validateSave(s){
  if(!s || typeof s !== 'object') return {ok:false, reason:'保存データの形式が不正。'};
  if(s.version !== CONFIG.saveVersion) return {ok:false, reason:'保存データのバージョンが異なる。'};
  if(!Array.isArray(s.party) || s.party.length !== 6) return {ok:false, reason:'パーティ情報が不正。'};
  if(!Array.isArray(s.inventory)) return {ok:false, reason:'所持品情報が不正。'};
  if(!s.dungeon || typeof s.dungeon.x !== 'number' || typeof s.dungeon.y !== 'number') return {ok:false, reason:'迷宮位置情報が不正。'};
  if(typeof s.gold !== 'number' || s.gold < 0) s.gold = 0;
  if(!Array.isArray(s.log)) s.log = ['保存データのログを補修した。'];
  s.party.forEach(c=>{
    if(typeof c.hp !== 'number') c.hp = 1;
    if(typeof c.maxHp !== 'number' || c.maxHp < 1) c.maxHp = 1;
    if(typeof c.mp !== 'number') c.mp = 0;
    if(typeof c.maxMp !== 'number') c.maxMp = 0;
    c.hp = clamp(c.hp,0,c.maxHp);
    c.mp = clamp(c.mp,0,c.maxMp);
    if(!c.status) c.status = c.hp > 0 ? '正常' : '戦闘不能';
  });
  return {ok:true};
}

function resetSave(){
  try{ localStorage.removeItem(CONFIG.saveKey); }catch(e){}
  state = null;
  titleMessage = '保存データを初期化した。';
  render();
}

/* =========================================================
   迷宮処理
========================================================= */
function currentFloor(){ return DATA.dungeon[state.dungeon.floor]; }
function cellAt(x,y){
  const floor = currentFloor();
  if(y < 0 || y >= floor.map.length) return '#';
  const row = floor.map[y];
  if(x < 0 || x >= row.length) return '#';
  return row[x];
}
function isWall(x,y){ return cellAt(x,y) === '#'; }
function forwardPosition(dirOffset=0, distance=1){
  const dir = (state.dungeon.dir + dirOffset + 4) % 4;
  const d = CONFIG.dirDelta[dir];
  return {x:state.dungeon.x + d.x*distance, y:state.dungeon.y + d.y*distance};
}
function enterDungeon(){
  const start = DATA.dungeon.B1.start;
  state.screen = SCREEN.DUNGEON;
  state.dungeon.floor = 'B1';
  state.dungeon.x = start.x;
  state.dungeon.y = start.y;
  state.dungeon.dir = start.dir;
  addLog('迷宮入口をくぐり、地下1階に入った。');
  saveGame();
  render();
}
function moveForward(){
  const p = forwardPosition(0,1);
  if(isWall(p.x,p.y)){ addLog('前方は壁だ。進めない。'); saveGame(); render(); return; }
  state.dungeon.x = p.x; state.dungeon.y = p.y; state.dungeon.steps += 1;
  addLog('一歩進んだ。');
  saveGame();
  maybeEncounter(0.24);
  render();
}
function stepBack(){
  const p = forwardPosition(2,1);
  if(isWall(p.x,p.y)){ addLog('背後は壁だ。下がれない。'); saveGame(); render(); return; }
  state.dungeon.x = p.x; state.dungeon.y = p.y; state.dungeon.steps += 1;
  addLog('背後へ下がった。');
  saveGame();
  maybeEncounter(0.16);
  render();
}
function turnLeft(){ state.dungeon.dir = (state.dungeon.dir + 3) % 4; addLog('左を向いた。'); saveGame(); render(); }
function turnRight(){ state.dungeon.dir = (state.dungeon.dir + 1) % 4; addLog('右を向いた。'); saveGame(); render(); }
function inspectArea(){ addLog('足音が闇の中に反響した。'); startEncounter('調査中に敵と遭遇した。'); }
function maybeEncounter(rate){ if(Math.random() < rate) startEncounter('迷宮の闇から敵が現れた。'); }

/* =========================================================
   戦闘処理
========================================================= */
function createEnemy(){
  const avgLevel = Math.max(1, Math.round(state.party.reduce((a,c)=>a+c.level,0)/state.party.length));
  const pool = DATA.enemies.filter(e => e.exp <= 18 + avgLevel*20);
  const base = sample(pool.length ? pool : DATA.enemies);
  return {
    id:base.id,
    name:base.name,
    maxHp:base.hp + Math.max(0, avgLevel-1)*5,
    hp:base.hp + Math.max(0, avgLevel-1)*5,
    attack:base.attack + Math.max(0, avgLevel-1)*2,
    defense:base.defense + Math.max(0, avgLevel-1),
    exp:base.exp + Math.max(0, avgLevel-1)*8,
    gold:base.gold + Math.max(0, avgLevel-1)*6
  };
}
function startEncounter(message){
  if(!state || state.screen === SCREEN.BATTLE) return;
  state.battle = {enemy:createEnemy(), turn:1, defending:false};
  state.screen = SCREEN.BATTLE;
  addLog(message);
  addLog(state.battle.enemy.name + 'が立ちはだかった。');
  saveGame();
  render();
}
function partyAttackValue(member){
  const rowFactor = member.row === 'back' && !['mage','priest','ranger'].includes(member.classKey) ? 0.55 : 1;
  return Math.max(1, Math.floor((member.attack + member.level + randInt(0,4)) * rowFactor));
}
function commandAttack(){
  const b = state.battle;
  let total = 0;
  aliveMembers().forEach(m => { total += Math.max(1, partyAttackValue(m) - Math.floor(b.enemy.defense/2)); });
  b.enemy.hp = Math.max(0, b.enemy.hp - total);
  addLog('隊列を保ったまま攻撃し、' + b.enemy.name + 'に' + total + 'の損傷を与えた。');
  if(checkVictory()) return;
  enemyTurn();
  saveGame();
  render();
}
function commandDefend(){
  state.battle.defending = true;
  addLog('全員が防御姿勢を取った。');
  enemyTurn();
  saveGame();
  render();
}
function commandMagic(){
  const caster = aliveMembers().find(c => c.mp >= 3);
  if(!caster){ addLog('魔法を使える者がいない、またはMPが足りない。'); enemyTurn(); saveGame(); render(); return; }
  caster.mp -= 3;
  const dmg = 10 + caster.level * 4 + randInt(0,8);
  state.battle.enemy.hp = Math.max(0, state.battle.enemy.hp - dmg);
  addLog(caster.name + 'が簡易呪文を放ち、' + state.battle.enemy.name + 'に' + dmg + 'の損傷を与えた。');
  if(checkVictory()) return;
  enemyTurn();
  saveGame();
  render();
}
function commandEscape(){
  const chance = Math.random();
  if(chance < 0.58){
    addLog('隊列を崩さず戦闘から離脱した。');
    state.battle = null;
    state.screen = SCREEN.DUNGEON;
    saveGame();
    render();
    return;
  }
  addLog('逃走に失敗した。');
  enemyTurn();
  saveGame();
  render();
}
function enemyTurn(){
  const b = state.battle;
  if(!b || b.enemy.hp <= 0) return;
  const targets = aliveMembers();
  if(targets.length === 0){ handleWipe(); return; }
  const target = sample(targets);
  const reduce = b.defending ? 2 : 1;
  const dmg = Math.max(1, Math.floor((b.enemy.attack + randInt(0,5) - target.defense/2) / reduce));
  target.hp = Math.max(0, target.hp - dmg);
  if(target.hp <= 0) target.status = '戦闘不能';
  addLog(b.enemy.name + 'の反撃。' + target.name + 'は' + dmg + 'の損傷を受けた。');
  b.defending = false;
  b.turn += 1;
  if(aliveMembers().length === 0) handleWipe();
}
function checkVictory(){
  const b = state.battle;
  if(!b || b.enemy.hp > 0) return false;
  handleVictory(b.enemy);
  return true;
}
function handleVictory(enemy){
  state.gold += enemy.gold;
  state.party.forEach(m => { if(m.status !== '戦闘不能') m.exp += enemy.exp; });
  const normalId = sample(['herb','draught','whetstone']);
  state.inventory.push(makeInventoryItem(normalId, true));
  const uniqueIds = Object.values(DATA.items).filter(i=>i.unique).map(i=>i.id);
  const uniqueId = uniqueIds[state.discoveryIndex % uniqueIds.length];
  state.discoveryIndex += 1;
  state.inventory.push(makeInventoryItem(uniqueId, false));
  addLog(enemy.name + 'を退けた。経験値' + enemy.exp + '、' + enemy.gold + 'G、' + DATA.items[normalId].name + '、未鑑定品を得た。');
  state.battle = null;
  state.screen = SCREEN.DUNGEON;
  saveGame();
  render();
}
function handleWipe(){
  const lost = Math.floor(state.gold / 2);
  state.gold -= lost;
  state.party.forEach(m => { m.hp = Math.max(1, Math.floor(m.maxHp/3)); m.mp = Math.max(0, Math.floor(m.maxMp/3)); m.status = '衰弱'; });
  addLog('全員が倒れた。探索隊は街へ運び戻された。所持金を' + lost + 'G失った。');
  state.battle = null;
  state.screen = SCREEN.TOWN;
  saveGame();
}

/* =========================================================
   アイテム処理・施設処理
========================================================= */
function itemData(inv){ return DATA.items[inv.itemId]; }
function itemDisplayName(inv){ const d = itemData(inv); return inv.identified ? d.name : d.unidentifiedName + '（未鑑定）'; }
function itemPriceForSale(inv){ const d = itemData(inv); return inv.identified ? Math.max(1, Math.floor(d.price/2)) : Math.max(1, Math.floor(d.price/8)); }
function restAtInn(){
  const cost = state.party.length * 5;
  if(state.gold < cost){ addLog('宿屋に泊まるには' + cost + 'G必要だ。'); render(); return; }
  state.gold -= cost;
  let levelLogs = [];
  state.party.forEach(m => {
    m.hp = m.maxHp;
    m.mp = m.maxMp;
    m.status = '正常';
    while(m.exp >= m.nextExp){
      const cls = DATA.classes[m.classKey];
      m.level += 1;
      m.exp -= m.nextExp;
      m.nextExp = Math.floor(m.nextExp * 1.65 + 10);
      m.maxHp += cls.growth.hp + randInt(0,3);
      m.maxMp += cls.growth.mp;
      m.attack += cls.growth.attack;
      m.defense += cls.growth.defense;
      m.hp = m.maxHp;
      m.mp = m.maxMp;
      levelLogs.push(m.name + 'はLv' + m.level + 'になった。');
    }
  });
  addLog('宿屋で休んだ。全員のHP/MPが回復した。');
  levelLogs.forEach(addLog);
  saveGame();
  render();
}
function buyItem(itemId){
  const d = DATA.items[itemId];
  if(state.gold < d.price){ addLog(d.name + 'を買うには' + d.price + 'G必要だ。'); render(); return; }
  state.gold -= d.price;
  state.inventory.push(makeInventoryItem(itemId, true));
  addLog(d.name + 'を購入した。');
  saveGame();
  render();
}
function sellItem(instanceId){
  const idx = state.inventory.findIndex(i => i.instanceId === instanceId);
  if(idx < 0){ addLog('売却対象が見つからない。'); render(); return; }
  const inv = state.inventory[idx];
  const price = itemPriceForSale(inv);
  const name = itemDisplayName(inv);
  state.inventory.splice(idx,1);
  state.gold += price;
  addLog(name + 'を' + price + 'Gで売却した。');
  saveGame();
  render();
}
function appraiseItem(instanceId){
  const inv = state.inventory.find(i => i.instanceId === instanceId);
  if(!inv){ addLog('鑑定対象が見つからない。'); render(); return; }
  if(inv.identified){ addLog('その品はすでに鑑定済みだ。'); render(); return; }
  const cost = 10;
  if(state.gold < cost){ addLog('鑑定には' + cost + 'G必要だ。'); render(); return; }
  state.gold -= cost;
  inv.identified = true;
  addLog(DATA.items[inv.itemId].unidentifiedName + 'は' + DATA.items[inv.itemId].name + 'だった。');
  saveGame();
  render();
}

/* =========================================================
   UI描画処理
========================================================= */
function screenName(){
  const names = {title:'タイトル', town:'街', dungeon:'迷宮探索', battle:'戦闘', inn:'宿屋', shop:'商店', appraisal:'鑑定所', party:'パーティ確認', items:'アイテム', reset:'保存初期化'};
  return names[state ? state.screen : SCREEN.TITLE] || '';
}
function render(){
  if(!appEl) appEl = document.getElementById('app');
  if(!state){ renderTitle(); return; }
  let html = '';
  html += renderHeader();
  html += '<main class="frame">' + renderMain() + '</main>';
  html += renderLog();
  html += renderPartySummary();
  html += '<section class="actions">' + renderActions() + '</section>';
  appEl.innerHTML = html;
  if(state.screen === SCREEN.DUNGEON) drawDungeon();
}
function renderHeader(){
  const d = state.dungeon;
  const place = state.screen === SCREEN.DUNGEON || state.screen === SCREEN.BATTLE ? (d.floor + ' X' + d.x + ' Y' + d.y + ' ' + CONFIG.directions[d.dir]) : '街';
  return '<header class="frame header"><div><div class="title">黒壁の地下廊 v0.1</div><div class="sub">' + escapeHtml(screenName()) + ' / ' + escapeHtml(place) + '</div></div><div class="statusLine">' + state.gold + 'G\n保存: ' + escapeHtml(state.lastSaveStatus || '未保存') + '</div></header>';
}
function renderTitle(){
  const loaded = loadGame();
  appEl.innerHTML = '<section class="frame"><div class="mainTitle">黒壁の地下廊</div><p class="center note">古典的3DダンジョンRPG v0.1 / 単体HTML版</p>' +
    (titleMessage ? '<p class="center warn">' + escapeHtml(titleMessage) + '</p>' : '') +
    '<p class="note">黒背景、枠線UI、6人パーティ、地下1階探索、ターン制戦闘、未鑑定品、鑑定、宿屋、商店、LocalStorage保存を備えた土台版。</p></section>' +
    '<section class="actions"><div class="grid2"><button data-action="new">新規開始</button><button data-action="continue" ' + (loaded.ok ? '' : 'disabled') + '>続きから</button></div><div class="grid2"><button data-action="resetConfirm">保存初期化</button><button data-action="new">最初から遊ぶ</button></div><p class="small">' + escapeHtml(loaded.ok ? '保存データあり。' : loaded.reason) + '</p></section>';
}
function renderMain(){
  switch(state.screen){
    case SCREEN.TOWN: return renderTown();
    case SCREEN.DUNGEON: return renderDungeon();
    case SCREEN.BATTLE: return renderBattle();
    case SCREEN.INN: return renderInn();
    case SCREEN.SHOP: return renderShop();
    case SCREEN.APPRAISAL: return renderAppraisal();
    case SCREEN.PARTY: return renderPartyDetail();
    case SCREEN.ITEMS: return renderItems();
    case SCREEN.RESET: return renderReset();
    default: return '<p>画面情報が不明です。</p>';
  }
}
function renderTown(){
  return '<h2>街</h2><p class="facilityText">石造りの門前に小さな街区がある。迷宮入口、宿屋、商店、鑑定所が利用できる。</p><div class="list">' +
    '<div class="listItem"><div class="itemName">迷宮入口</div><div class="itemDesc">地下1階へ入る。</div></div>' +
    '<div class="listItem"><div class="itemName">宿屋</div><div class="itemDesc">回復し、経験値条件を満たした者を成長させる。</div></div>' +
    '<div class="listItem"><div class="itemName">商店</div><div class="itemDesc">通常品の購入と所持品の売却を行う。</div></div>' +
    '<div class="listItem"><div class="itemName">鑑定所</div><div class="itemDesc">未鑑定品を正式名称へ変える。</div></div>' +
    '</div>';
}
function renderDungeon(){
  return '<div class="dungeonView"><canvas id="mazeCanvas" width="500" height="240" aria-label="疑似3Dダンジョン表示"></canvas><div class="mazeLabel">' + escapeHtml(currentFloor().name) + ' / ' + escapeHtml(CONFIG.directions[state.dungeon.dir]) + '</div></div><p class="small">前進・旋回・後退で位置と向きを管理する。調べる操作では敵遭遇を発生させる。</p>';
}
function renderBattle(){
  const e = state.battle.enemy;
  const pct = e.maxHp ? Math.max(0, Math.round(e.hp/e.maxHp*100)) : 0;
  return '<div class="enemyBox"><div class="enemyName">' + escapeHtml(e.name) + '</div><div class="hpbar"><span style="width:' + pct + '%"></span></div><div class="center small">敵HP ' + e.hp + ' / ' + e.maxHp + '　Turn ' + state.battle.turn + '</div></div>';
}
function renderInn(){
  const cost = state.party.length * 5;
  const ready = state.party.filter(m => m.exp >= m.nextExp).map(m=>m.name);
  return '<h2>宿屋</h2><p>宿泊費 ' + cost + 'G。全員のHP/MPを回復し、条件を満たす者はレベルアップする。</p><p class="small">成長可能: ' + escapeHtml(ready.length ? ready.join('、') : 'なし') + '</p>';
}
function renderShop(){
  let buy = '<h2>商店</h2><p class="small">購入</p><div class="list">';
  DATA.shop.forEach(id=>{ const d=DATA.items[id]; buy += '<div class="listItem"><div class="itemName">' + escapeHtml(d.name) + ' / ' + d.price + 'G</div><div class="itemDesc">' + escapeHtml(d.description) + '</div><button data-action="buy:' + id + '">購入</button></div>'; });
  buy += '</div><p class="small">売却</p>' + renderSellList();
  return buy;
}
function renderSellList(){
  if(state.inventory.length === 0) return '<p class="note">売却できる所持品はない。</p>';
  let html = '<div class="list">';
  state.inventory.forEach(inv=>{ html += '<div class="listItem"><div class="itemName">' + escapeHtml(itemDisplayName(inv)) + '</div><div class="itemDesc">売値 ' + itemPriceForSale(inv) + 'G</div><button data-action="sell:' + inv.instanceId + '">売却</button></div>'; });
  return html + '</div>';
}
function renderAppraisal(){
  const targets = state.inventory.filter(i=>!i.identified);
  let html = '<h2>鑑定所</h2><p>鑑定費は1点10G。未鑑定品を正式名称に変える。</p>';
  if(targets.length === 0) return html + '<p class="note">未鑑定品はない。</p>';
  html += '<div class="list">';
  targets.forEach(inv=>{ html += '<div class="listItem"><div class="itemName">' + escapeHtml(itemDisplayName(inv)) + '</div><div class="itemDesc">種別不明。鑑定後に正式名称を表示する。</div><button data-action="appraise:' + inv.instanceId + '">鑑定する</button></div>'; });
  return html + '</div>';
}
function renderItems(){
  let html = '<h2>アイテム一覧</h2>';
  if(state.inventory.length === 0) return html + '<p class="note">所持品はない。</p>';
  html += '<div class="list">';
  state.inventory.forEach(inv=>{ const d=itemData(inv); html += '<div class="listItem"><div class="itemName">' + escapeHtml(itemDisplayName(inv)) + '</div><div class="itemDesc">' + escapeHtml(inv.identified ? d.description : '未鑑定。鑑定所で正体を確認できる。') + '</div><div class="small">種別: ' + escapeHtml(inv.identified ? d.type : '不明') + ' / 固有: ' + (d.unique ? 'はい' : 'いいえ') + '</div></div>'; });
  return html + '</div>';
}
function renderPartyDetail(){
  let html = '<h2>パーティ確認</h2><div class="list">';
  state.party.forEach(m=>{ html += '<div class="listItem"><div class="itemName">' + escapeHtml(m.name) + ' / ' + escapeHtml(m.race) + ' / ' + escapeHtml(m.className) + '</div><div>Lv ' + m.level + ' EXP ' + m.exp + ' / 次 ' + m.nextExp + '</div><div>HP ' + m.hp + '/' + m.maxHp + ' MP ' + m.mp + '/' + m.maxMp + ' 攻 ' + m.attack + ' 防 ' + m.defense + '</div><div class="small">隊列: ' + (m.row === 'front' ? '前衛' : '後衛') + ' / 状態: ' + escapeHtml(m.status) + '</div></div>'; });
  return html + '</div>';
}
function renderReset(){
  return '<h2>保存初期化</h2><p class="warn">LocalStorage上の保存データを削除する。実行後はタイトルへ戻る。</p>';
}
function renderLog(){
  const logs = (state.log || []).slice(0,12).map(l=>'<div>' + escapeHtml(l) + '</div>').join('');
  return '<section class="frame"><div class="sub">ログ</div><div class="log">' + logs + '</div></section>';
}
function renderPartySummary(){
  const front = state.party.filter(m=>m.row==='front');
  const back = state.party.filter(m=>m.row==='back');
  return '<section class="frame partyBlock"><div><div class="partyRowTitle">前衛</div><div class="memberGrid">' + front.map(renderMember).join('') + '</div></div><div><div class="partyRowTitle">後衛</div><div class="memberGrid">' + back.map(renderMember).join('') + '</div></div></section>';
}
function renderMember(m){
  const cls = m.status === '戦闘不能' ? 'member dead' : 'member';
  return '<div class="' + cls + '"><div class="name">' + escapeHtml(m.name) + '</div><div class="meta">' + escapeHtml(m.race) + '/' + escapeHtml(m.className) + ' Lv' + m.level + '</div><div class="nums">HP ' + m.hp + '/' + m.maxHp + '</div><div class="nums">MP ' + m.mp + '/' + m.maxMp + '</div><div class="meta">' + escapeHtml(m.status) + '</div></div>';
}
function renderActions(){
  switch(state.screen){
    case SCREEN.TOWN:
      return '<div class="grid2"><button data-action="enterDungeon">迷宮入口</button><button data-action="inn">宿屋</button><button data-action="shop">商店</button><button data-action="appraisal">鑑定所</button><button data-action="party">パーティ確認</button><button data-action="items">アイテム</button></div><div class="grid2"><button data-action="resetConfirm">保存初期化</button><button data-action="title">タイトル</button></div>';
    case SCREEN.DUNGEON:
      return '<div class="grid3"><button data-action="turnLeft">左旋回</button><button data-action="moveForward">前進</button><button data-action="turnRight">右旋回</button></div><div class="grid3"><button data-action="stepBack">後退</button><button data-action="inspect">調べる</button><button data-action="party">隊列確認</button></div><div class="grid2"><button data-action="town">街へ戻る</button><button data-action="items">アイテム</button></div>';
    case SCREEN.BATTLE:
      return '<div class="grid2"><button data-action="attack">攻撃</button><button data-action="defend">防御</button><button data-action="magic">魔法</button><button data-action="escape">逃走</button></div>';
    case SCREEN.INN:
      return '<div class="grid2"><button data-action="rest">休む</button><button data-action="town">街へ戻る</button></div>';
    case SCREEN.SHOP:
    case SCREEN.APPRAISAL:
    case SCREEN.PARTY:
    case SCREEN.ITEMS:
      return '<div class="grid2"><button data-action="town">街へ戻る</button><button data-action="title">タイトル</button></div>';
    case SCREEN.RESET:
      return '<div class="grid2"><button data-action="resetNow">初期化する</button><button data-action="town">中止して街へ戻る</button></div>';
    default:
      return '<button data-action="town">街へ戻る</button>';
  }
}
function drawDungeon(){
  const canvas = document.getElementById('mazeCanvas');
  if(!canvas || !canvas.getContext) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle = '#e6e6e6'; ctx.lineWidth = 2;
  ctx.strokeRect(6,6,w-12,h-12);
  const layers = [
    {d:3, rect:[185,70,130,85], side:[120,45,380,45,315,70,185,70]},
    {d:2, rect:[145,48,210,125], side:[70,20,430,20,355,48,145,48]},
    {d:1, rect:[92,24,316,178], side:[10,8,490,8,408,24,92,24]}
  ];
  layers.forEach(layer=>{
    const p = forwardPosition(0,layer.d);
    const left = forwardPosition(3,layer.d);
    const right = forwardPosition(1,layer.d);
    const r = layer.rect;
    ctx.strokeStyle = '#9a9a9a';
    ctx.strokeRect(r[0],r[1],r[2],r[3]);
    if(isWall(p.x,p.y)){
      ctx.fillStyle = 'rgba(210,210,210,.10)'; ctx.fillRect(r[0],r[1],r[2],r[3]);
      ctx.strokeStyle = '#f0f0f0'; ctx.strokeRect(r[0],r[1],r[2],r[3]);
    }else{
      ctx.strokeStyle = '#777';
      ctx.beginPath(); ctx.moveTo(r[0],r[1]); ctx.lineTo(w/2,h/2); ctx.lineTo(r[0]+r[2],r[1]); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(r[0],r[1]+r[3]); ctx.lineTo(w/2,h/2); ctx.lineTo(r[0]+r[2],r[1]+r[3]); ctx.stroke();
    }
    ctx.strokeStyle = '#585858';
    if(isWall(left.x,left.y)){ ctx.beginPath(); ctx.moveTo(layer.side[0],layer.side[1]); ctx.lineTo(layer.side[6],layer.side[7]); ctx.stroke(); }
    if(isWall(right.x,right.y)){ ctx.beginPath(); ctx.moveTo(layer.side[2],layer.side[3]); ctx.lineTo(layer.side[4],layer.side[5]); ctx.stroke(); }
  });
  ctx.fillStyle = '#cfcfcf'; ctx.font = '14px monospace';
  ctx.fillText('X' + state.dungeon.x + ' Y' + state.dungeon.y + ' ' + CONFIG.directions[state.dungeon.dir], 16, 24);
}

/* =========================================================
   イベント処理
========================================================= */
document.addEventListener('click', function(ev){
  const btn = ev.target.closest('button[data-action]');
  if(!btn) return;
  const action = btn.getAttribute('data-action');
  handleAction(action);
});
function gotoScreen(screen){
  if(!state) return;
  state.screen = screen;
  saveGame();
  render();
}
function handleAction(action){
  if(action === 'new') { state = createInitialState(); titleMessage=''; saveGame(); render(); return; }
  if(action === 'continue') { const loaded = loadGame(); if(loaded.ok){ state = loaded.state; addLog('保存データから再開した。'); saveGame(); render(); } else { titleMessage = loaded.reason + ' 新規開始または初期化を選んでください。'; state = null; render(); } return; }
  if(action === 'title') { state = null; titleMessage=''; render(); return; }
  if(action === 'resetConfirm') { if(state){ state.screen = SCREEN.RESET; render(); } else { appEl.innerHTML = '<section class="frame"><h2>保存初期化</h2><p class="warn">保存データを削除します。</p></section><section class="actions"><div class="grid2"><button data-action="resetNow">初期化する</button><button data-action="title">中止</button></div></section>'; } return; }
  if(action === 'resetNow') { resetSave(); return; }
  if(!state) return;
  if(action.startsWith('buy:')) { buyItem(action.split(':')[1]); return; }
  if(action.startsWith('sell:')) { sellItem(action.split(':')[1]); return; }
  if(action.startsWith('appraise:')) { appraiseItem(action.split(':')[1]); return; }
  switch(action){
    case 'town': state.screen = SCREEN.TOWN; addLog('街へ戻った。'); saveGame(); render(); break;
    case 'enterDungeon': enterDungeon(); break;
    case 'inn': gotoScreen(SCREEN.INN); break;
    case 'shop': gotoScreen(SCREEN.SHOP); break;
    case 'appraisal': gotoScreen(SCREEN.APPRAISAL); break;
    case 'party': gotoScreen(SCREEN.PARTY); break;
    case 'items': gotoScreen(SCREEN.ITEMS); break;
    case 'moveForward': moveForward(); break;
    case 'stepBack': stepBack(); break;
    case 'turnLeft': turnLeft(); break;
    case 'turnRight': turnRight(); break;
    case 'inspect': inspectArea(); break;
    case 'attack': commandAttack(); break;
    case 'defend': commandDefend(); break;
    case 'magic': commandMagic(); break;
    case 'escape': commandEscape(); break;
    case 'rest': restAtInn(); break;
  }
}

render();
</script>
