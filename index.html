<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>地下回廊の試練</title>
<style>
:root{
  --bg:#030303; --panel:#090908; --panel2:#10100e; --fg:#ece7cf; --muted:#afa783;
  --line:#9c936f; --line2:#5f5a42; --accent:#f0d978; --good:#b7e9ad; --bad:#ffaaa0; --warn:#ffd98a;
  --app-h:100dvh;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;min-height:100%;background:#000;color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;overflow:hidden;}
body{touch-action:manipulation;}
button,input,select{font:inherit;color:inherit;}
#app{height:var(--app-h);max-width:540px;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;gap:6px;padding:calc(env(safe-area-inset-top,0px) + 6px) 10px calc(env(safe-area-inset-bottom,0px) + 8px);overflow:hidden;}
.header{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 2px 5px;border-bottom:1px solid var(--line);min-height:30px;}
.header .title{font-weight:800;letter-spacing:.04em;font-size:17px;white-space:nowrap;}
.header .meta{color:var(--muted);font-size:13px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.main{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:6px;overflow:hidden;}
.panel{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),#050504);padding:10px;box-shadow:inset 0 0 0 1px #1c1a12;}
.title-panel{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;justify-content:center;gap:14px;text-align:center;}
.game-title{font-size:30px;font-weight:900;letter-spacing:.12em;line-height:1.25;color:var(--fg);text-shadow:0 0 12px rgba(240,217,120,.18);}
.subtitle{font-size:14px;color:var(--muted);line-height:1.5;}
.view-wrap{flex:0 0 clamp(188px,32svh,252px);border:2px solid var(--line);background:#000;position:relative;box-shadow:inset 0 0 0 1px #252112;overflow:hidden;}
#dungeonCanvas{width:100%;height:100%;display:block;background:#000;}
.view-caption{position:absolute;left:8px;top:6px;color:rgba(236,231,207,.72);font-weight:700;font-size:13px;letter-spacing:.04em;pointer-events:none;text-shadow:0 1px 2px #000;}
.view-status{position:absolute;left:8px;right:8px;bottom:6px;display:flex;justify-content:space-between;gap:6px;pointer-events:none;font-size:12px;color:rgba(236,231,207,.78);text-shadow:0 1px 2px #000;}
.view-status span{border:1px solid rgba(156,147,111,.45);background:rgba(0,0,0,.62);padding:2px 5px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.enemy-stage{flex:0 0 clamp(172px,28svh,230px);border:2px solid var(--line);background:#000;position:relative;padding:10px;display:flex;flex-direction:column;gap:8px;justify-content:center;overflow:hidden;}
.enemy-stage:before{content:"";position:absolute;inset:8px;border:1px solid rgba(156,147,111,.35);pointer-events:none;}
.enemy-row{display:flex;gap:8px;justify-content:center;align-items:stretch;z-index:1;}
.enemy-card{border:1px solid var(--line);background:#0a0a08;min-width:84px;max-width:31%;padding:8px 6px;text-align:center;position:relative;}
.enemy-sigil{width:44px;height:44px;margin:0 auto 4px;border:2px solid var(--line);border-radius:50% 50% 45% 45%;box-shadow:inset 0 -8px 0 rgba(156,147,111,.18);}
.enemy-name{font-weight:800;font-size:13px;line-height:1.2;}
.enemy-hp{font-size:12px;color:var(--muted);margin-top:2px;}
.party-box{flex:0 0 auto;border:1px solid var(--line);padding:6px;background:#070706;}
.rank-label{display:flex;align-items:center;gap:8px;color:var(--accent);font-weight:800;font-size:13px;margin:0 0 5px;}
.rank-label:after{content:"";height:1px;background:var(--line2);flex:1;}
.party-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:5px;margin-bottom:5px;}
.member{border:1px solid var(--line2);background:#0b0b09;padding:5px 5px 6px;min-width:0;}
.member.dead{border-color:#70463f;color:#b99990;background:#100807;}
.member .n{font-weight:900;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member .sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member .hp,.member .mp{font-size:13px;line-height:1.25;white-space:nowrap;}
.hp{color:var(--good)} .mp{color:#d7c899}.bad{color:var(--bad)}.warn{color:var(--warn)}.good{color:var(--good)}
.logbox{flex:0 0 clamp(82px,16svh,122px);border:1px solid var(--line);background:#030303;padding:6px 8px;overflow-y:auto;-webkit-overflow-scrolling:touch;font-size:14px;line-height:1.36;}
.logline{border-bottom:1px dotted rgba(156,147,111,.22);padding:1px 0 3px;}
.logline.turn{color:var(--accent);font-weight:800;border-bottom-color:rgba(240,217,120,.45);}
.actions{flex:0 0 auto;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;background:#000;padding-top:2px;}
.actions.two{grid-template-columns:repeat(2,minmax(0,1fr));}.actions.four{grid-template-columns:repeat(4,minmax(0,1fr));}.actions.one{grid-template-columns:1fr;}
.dungeon-pad{flex:0 0 auto;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));grid-template-areas:"empty1 forward empty2" "left inspect right" "town back menu";gap:6px;background:#000;padding-top:2px;}
.dungeon-pad .forward{grid-area:forward}.dungeon-pad .left{grid-area:left}.dungeon-pad .right{grid-area:right}.dungeon-pad .inspect{grid-area:inspect}.dungeon-pad .back{grid-area:back}.dungeon-pad .town{grid-area:town}.dungeon-pad .menu{grid-area:menu}.dungeon-pad .spacer{min-height:44px;pointer-events:none;opacity:0;}
.btn{min-height:48px;border:1px solid var(--line);background:linear-gradient(180deg,#171611,#090908);color:var(--fg);font-weight:800;letter-spacing:.03em;border-radius:0;padding:8px 6px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);}
.btn:active{transform:translateY(1px);background:#201d13;}.btn.primary{color:#fff4ba;border-color:#c4b56e;}.btn.danger{color:#ffbeb6;border-color:#8d5149;}.btn:disabled{opacity:.45;}
.menu-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:8px;}
.menu-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}.menu-grid .btn{min-height:56px;}
.note{font-size:13px;line-height:1.55;color:var(--muted);}.section-title{font-weight:900;color:var(--accent);margin:0 0 6px;font-size:15px;}
.table{width:100%;border-collapse:collapse;font-size:13px;}.table th,.table td{border:1px solid var(--line2);padding:5px 6px;text-align:left;vertical-align:top;}.table th{color:var(--accent);font-weight:800;background:#11100c;}
.item-row{border:1px solid var(--line2);padding:7px;margin-bottom:6px;background:#0a0a08;display:flex;gap:8px;justify-content:space-between;align-items:center;}.item-row .info{min-width:0;}.item-row .name{font-weight:800;}.item-row .desc{font-size:12px;color:var(--muted);line-height:1.35;}.small-btn{min-height:38px;padding:6px 8px;font-size:13px;}
.reset-box{border-color:#8d5149;background:#110807;}.diag-pass{color:var(--good);font-weight:800}.diag-fail{color:var(--bad);font-weight:800}
@media (max-height:720px){
  #app{gap:4px;padding-top:calc(env(safe-area-inset-top,0px) + 4px);padding-left:8px;padding-right:8px;}
  .header{min-height:26px;padding-bottom:3px}.header .title{font-size:15px}.header .meta{font-size:12px}
  .view-wrap{flex-basis:clamp(154px,28svh,200px)}.enemy-stage{flex-basis:clamp(144px,25svh,190px)}
  .party-box{padding:4px}.rank-label{font-size:12px;margin-bottom:3px}.party-grid{gap:4px;margin-bottom:3px}
  .member{padding:4px}.member .n{font-size:13px}.member .sub{font-size:10px}.member .hp,.member .mp{font-size:12px}
  .logbox{flex-basis:66px;font-size:13px;padding:5px 7px}.btn{min-height:45px;font-size:14px;padding:6px 4px}.actions,.dungeon-pad{gap:5px}.dungeon-pad .spacer{min-height:45px}
}
@media (max-width:360px){.game-title{font-size:26px}.btn{font-size:13px}.member .n{font-size:12px}.member .hp,.member .mp{font-size:11px}.logbox{font-size:12px}.enemy-card{min-width:76px;padding-left:4px;padding-right:4px}}

.battle-prompt{border:1px solid var(--line);background:#080806;padding:7px 8px;font-size:14px;line-height:1.35;}
.battle-prompt span{color:var(--muted);font-size:12px;margin-left:4px;}
.cmd-queue{border:1px solid var(--line2);background:#050504;color:var(--muted);padding:5px 6px;font-size:12px;line-height:1.4;min-height:30px;}
.cmd-chip{display:inline-block;border:1px solid var(--line2);padding:2px 5px;margin:1px 3px 1px 0;color:var(--fg);background:#0d0c09;}
.inn-row .desc .good{font-weight:800;}
.enemy-card.dead{opacity:.45;}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
'use strict';

const KEY = 'classic_dungeon_rpg_single_html_gate_v1';
const DIRS = ['北','東','南','西'];
const DELTA = [{x:0,y:-1},{x:1,y:0},{x:0,y:1},{x:-1,y:0}];
const DATA = {
  version: 1,
  facilities: ['宿屋','商店','鑑定所'],
  map: {
    floor:'地下1階', width:9, height:9,
    rows:[
      '#########',
      '#S..D...#',
      '#.#.###.#',
      '#.#...#.#',
      '#.###.#.#',
      '#...#...#',
      '#.#.#.#.#',
      '#...C..R#',
      '#########'
    ],
    start:{x:1,y:1,dir:1},
    chests:{'4,7':{name:'古い木箱',opened:false,normal:['heal_potion'],unidentified:['unknown_ring']}}
  },
  party:[
    {id:'a',name:'アレン',race:'人間',job:'剣士',position:'front',level:1,exp:0,maxHp:31,hp:31,maxMp:0,mp:0,atk:7,def:3,status:'正常'},
    {id:'b',name:'ボルク',race:'鉱人',job:'守人',position:'front',level:1,exp:0,maxHp:36,hp:36,maxMp:0,mp:0,atk:6,def:5,status:'正常'},
    {id:'c',name:'キリ',race:'草原人',job:'盗賊',position:'front',level:1,exp:0,maxHp:26,hp:26,maxMp:0,mp:0,atk:6,def:2,status:'正常'},
    {id:'d',name:'セリア',race:'森人',job:'司祭',position:'back',level:1,exp:0,maxHp:23,hp:23,maxMp:13,mp:13,atk:3,def:2,status:'正常'},
    {id:'e',name:'メル',race:'人間',job:'魔術師',position:'back',level:1,exp:0,maxHp:19,hp:19,maxMp:17,mp:17,atk:2,def:1,status:'正常'},
    {id:'f',name:'トウマ',race:'風族',job:'弓手',position:'back',level:1,exp:0,maxHp:24,hp:24,maxMp:5,mp:5,atk:5,def:2,status:'正常'}
  ],
  enemies:{
    mold:{name:'黒苔の塊',maxHp:10,atk:3,def:1,exp:10,gold:[8,15]},
    worm:{name:'牙虫',maxHp:14,atk:4,def:1,exp:13,gold:[10,18]},
    bone:{name:'骨の番人',maxHp:18,atk:5,def:2,exp:18,gold:[15,25]},
    shade:{name:'燭台の影',maxHp:16,atk:6,def:1,exp:20,gold:[16,28]},
    armor:{name:'錆びた鎧',maxHp:24,atk:7,def:3,exp:28,gold:[24,38]}
  },
  encounters:[['mold'],['worm','mold'],['bone'],['worm','worm'],['shade'],['armor']],
  items:{
    heal_potion:{name:'小治癒薬',type:'通常',value:12,desc:'味方1人のHPを18回復する。',usable:true},
    tonic:{name:'澄んだ薬瓶',type:'通常',value:18,desc:'味方1人のMPを5回復する。',usable:true},
    old_coin:{name:'古銭',type:'通常',value:16,desc:'商店で売れる古い貨幣。'},
    bronze_knife:{name:'青銅の短剣',type:'通常',value:24,desc:'簡素な短剣。売却用。'},
    leather_guard:{name:'革の小盾',type:'通常',value:28,desc:'軽い盾。売却用。'},
    star_dagger:{name:'星読みの短剣',type:'固有',unique:true,value:90,desc:'刃に星図が刻まれた短剣。'},
    glass_ring:{name:'灰玻璃の指輪',type:'固有',unique:true,value:105,desc:'灰色の光を湛えた指輪。'},
    night_charm:{name:'夜鐘の護符',type:'固有',unique:true,value:120,desc:'鳴らない鐘形の護符。'},
    silver_cup:{name:'古王の銀杯',type:'固有',unique:true,value:150,desc:'底に古い王印がある杯。'},
    sealed_mirror:{name:'封蝋の手鏡',type:'固有',unique:true,value:135,desc:'鏡面に封蝋が押された手鏡。'},
    earth_hammer:{name:'土脈の小槌',type:'固有',unique:true,value:160,desc:'重さに反して手に馴染む小槌。'}
  },
  unidentified:{
    unknown_box:{tempName:'未鑑定品「煤けた小箱」',itemId:'old_coin'},
    unknown_ring:{tempName:'未鑑定品「曇った指輪」',itemId:'glass_ring'},
    unknown_blade:{tempName:'未鑑定品「布巻きの刃」',itemId:'star_dagger'},
    unknown_charm:{tempName:'未鑑定品「封じた護符」',itemId:'night_charm'},
    unknown_cup:{tempName:'未鑑定品「黒ずんだ杯」',itemId:'silver_cup'},
    unknown_mirror:{tempName:'未鑑定品「覆われた鏡」',itemId:'sealed_mirror'},
    unknown_hammer:{tempName:'未鑑定品「重い包み」',itemId:'earth_hammer'}
  },
  shop:[
    {itemId:'heal_potion',price:18},
    {itemId:'tonic',price:26},
    {itemId:'bronze_knife',price:42},
    {itemId:'leather_guard',price:48}
  ]
};

let state = null;
let saveNotice = '';
const app = document.getElementById('app');

function setViewportHeight(){
  const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-h', Math.max(520, Math.floor(h)) + 'px');
}
window.addEventListener('resize', setViewportHeight);
if(window.visualViewport){ window.visualViewport.addEventListener('resize', setViewportHeight); window.visualViewport.addEventListener('scroll', setViewportHeight); }
setViewportHeight();

function clone(v){ return JSON.parse(JSON.stringify(v)); }
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function addLog(text, cls){ if(!state) return; state.log.push({text, cls:cls||''}); if(state.log.length>80) state.log.splice(0,state.log.length-80); }
function nextExp(level){ return 20 + level*level*16; }
function aliveParty(){ return state.party.filter(p=>p.hp>0); }
function frontAlive(){ return state.party.filter(p=>p.position==='front' && p.hp>0); }
function allDead(){ return state.party.every(p=>p.hp<=0); }
function getItemName(id){ return DATA.items[id] ? DATA.items[id].name : id; }
function itemValue(id){ return DATA.items[id] ? DATA.items[id].value : 0; }
function countInventory(id){ return state.inventory.filter(x=>x===id).length; }
function addItem(id){ state.inventory.push(id); const it = DATA.items[id]; if(it && it.unique && !state.catalog.includes(id)) state.catalog.push(id); }
function addUnidentified(templateId){ const t = DATA.unidentified[templateId]; if(!t) return; state.unidentified.push({uid:'u'+Date.now()+Math.random().toString(16).slice(2), templateId, tempName:t.tempName, itemId:t.itemId}); }
function removeOneInventory(id){ const idx = state.inventory.indexOf(id); if(idx>=0){ state.inventory.splice(idx,1); return true; } return false; }

function createNewState(){
  const s = {
    version:DATA.version, screen:'city', gold:120,
    location:{floor:'地下1階',x:DATA.map.start.x,y:DATA.map.start.y,dir:DATA.map.start.dir},
    party:clone(DATA.party), inventory:['heal_potion','heal_potion'], unidentified:[], catalog:[],
    chests:clone(DATA.map.chests), battle:null, log:[], flags:{visitedDoor:false, steps:0}
  };
  state=s;
  addLog('街の広場に集まった。迷宮入口が開いている。');
  saveGame();
  render();
}

function validateSave(s){
  if(!s || s.version!==DATA.version) return false;
  if(!Array.isArray(s.party) || s.party.length!==6) return false;
  if(!s.location || typeof s.location.x!=='number' || typeof s.location.y!=='number' || typeof s.location.dir!=='number') return false;
  if(!Array.isArray(s.inventory) || !Array.isArray(s.unidentified) || !Array.isArray(s.log)) return false;
  if(typeof s.gold!=='number' || !s.screen) return false;
  return true;
}
function loadSave(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return {ok:false, reason:'保存データなし'};
    const parsed = JSON.parse(raw);
    if(!validateSave(parsed)) return {ok:false, reason:'保存データの構造が不正'};
    return {ok:true, state:parsed};
  }catch(e){ return {ok:false, reason:'保存データを読めない'}; }
}
function saveGame(){
  if(!state) return;
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){ saveNotice='保存に失敗: '+e.message; }
}
function resetSave(){
  try{ localStorage.removeItem(KEY); }catch(e){}
  state=null; saveNotice='保存データを初期化した。'; renderTitle();
}
function continueGame(){
  const loaded=loadSave();
  if(loaded.ok){ state=loaded.state; addLog('保存データから再開した。'); saveGame(); render(); }
  else { saveNotice='続きから再開できない: '+loaded.reason; renderTitle(); }
}
function safeLoadNotice(){ const l=loadSave(); return l.ok ? '保存データあり' : l.reason; }

function cellAt(x,y){
  if(y<0 || y>=DATA.map.rows.length || x<0 || x>=DATA.map.rows[0].length) return '#';
  return DATA.map.rows[y][x];
}
function isWall(x,y){ return cellAt(x,y)==='#'; }
function stepPos(x,y,dir,dist){ const d=DELTA[(dir+4)%4]; return {x:x+d.x*dist,y:y+d.y*dist}; }
function sidePos(x,y,dir,side){ const d=DELTA[(dir+side+4)%4]; return {x:x+d.x,y:y+d.y}; }
function canMoveTo(x,y){ return !isWall(x,y); }
function cellDisplayName(ch){
  return ch==='#'?'壁':ch==='D'?'扉':ch==='C'?'宝箱':ch==='R'?'帰還階段':'通路';
}
function dungeonViewSummary(){
  const loc=state.location;
  const f=stepPos(loc.x,loc.y,loc.dir,1);
  const l=sidePos(loc.x,loc.y,loc.dir,-1);
  const r=sidePos(loc.x,loc.y,loc.dir,1);
  return {front:cellDisplayName(cellAt(f.x,f.y)), left:cellDisplayName(cellAt(l.x,l.y)), right:cellDisplayName(cellAt(r.x,r.y))};
}
function moveForward(){
  const n=stepPos(state.location.x,state.location.y,state.location.dir,1);
  if(!canMoveTo(n.x,n.y)){ addLog('正面は壁だ。'); saveGame(); render(); return; }
  state.location.x=n.x; state.location.y=n.y; state.flags.steps++;
  const c=cellAt(n.x,n.y);
  if(c==='D' && !state.flags.visitedDoor){ state.flags.visitedDoor=true; addLog('重い扉を押し開いた。'); }
  else if(c==='R'){ addLog('帰還の階段を見つけた。街へ戻れる。'); }
  else { addLog('一歩進んだ。'); }
  afterDungeonStep();
}
function moveBack(){
  const n=stepPos(state.location.x,state.location.y,state.location.dir, -1);
  if(!canMoveTo(n.x,n.y)){ addLog('背後は壁だ。'); saveGame(); render(); return; }
  state.location.x=n.x; state.location.y=n.y; state.flags.steps++; addLog('後退した。'); afterDungeonStep();
}
function turn(delta){ state.location.dir=(state.location.dir+delta+4)%4; addLog(delta>0?'右を向いた。':'左を向いた。'); saveGame(); render(); }
function afterDungeonStep(){
  if(Math.random()<0.20){ startBattle('encounter'); return; }
  saveGame(); render();
}
function inspectCell(){
  const key=state.location.x+','+state.location.y;
  const chest=state.chests[key];
  if(chest && !chest.opened){
    chest.opened=true;
    addLog(chest.name+'を開けた。');
    (chest.normal||[]).forEach(id=>{ addItem(id); addLog(getItemName(id)+'を得た。'); });
    (chest.unidentified||[]).forEach(id=>{ addUnidentified(id); addLog(DATA.unidentified[id].tempName+'を得た。'); });
    saveGame(); render(); return;
  }
  if(cellAt(state.location.x,state.location.y)==='R'){ goCity('階段を上がり、街へ戻った。'); return; }
  if(Math.random()<0.55){ startBattle('inspect'); return; }
  addLog('周囲を調べたが、目立つものはない。'); saveGame(); render();
}
function enterDungeon(){ state.screen='dungeon'; addLog('地下1階へ入った。'); saveGame(); render(); }
function goCity(msg){ state.screen='city'; state.battle=null; if(msg) addLog(msg); saveGame(); render(); }

function startBattle(source){
  const group = pick(DATA.encounters).map(id=>clone(DATA.enemies[id]));
  group.forEach((e,i)=>{ e.id='e'+i+'_'+Date.now(); e.hp=e.maxHp; });
  state.battle={turn:1,enemies:group,commands:{},guards:{},escapeTried:false};
  state.screen='battle';
  addLog('敵が現れた。');
  addLog(group.map(e=>e.name).join('、')+'。');
  saveGame(); render();
}
function enemyAlive(){ return state.battle ? state.battle.enemies.filter(e=>e.hp>0) : []; }
function firstEnemy(){ return enemyAlive()[0]; }
function currentCommandActor(){
  if(!state.battle) return null;
  return state.party.find(p=>p.hp>0 && !state.battle.commands[p.id]);
}
function commandName(cmd){ return {attack:'攻撃',defend:'防御',magic:'魔法',escape:'逃走'}[cmd] || cmd; }
function setBattleCommand(cmd){
  if(!state.battle) return;
  const actor=currentCommandActor();
  if(!actor){ resolvePartyCommands(); return; }
  state.battle.commands[actor.id]=cmd;
  addLog(actor.name+'に「'+commandName(cmd)+'」を指示した。');
  if(currentCommandActor()){ saveGame(); render(); return; }
  resolvePartyCommands();
}
function resolvePartyCommands(){
  if(!state.battle) return;
  addLog('【'+state.battle.turn+'ターン目】','turn');
  state.battle.guards={};
  const actors=state.party.filter(p=>p.hp>0);
  for(const p of actors){
    const cmd=state.battle.commands[p.id] || 'defend';
    if(cmd==='escape'){
      const rate = p.job==='盗賊' ? 0.58 : 0.42;
      addLog(p.name+'は退路を探した。');
      if(Math.random()<rate){
        addLog(p.name+'の判断で、隊は戦場を離脱した。');
        state.screen='dungeon'; state.battle=null; saveGame(); render(); return;
      }
      addLog('しかし逃げ道をつかめない。');
      continue;
    }
    if(cmd==='defend'){
      state.battle.guards[p.id]=true;
      addLog(p.name+'は身を守った。');
      continue;
    }
    if(cmd==='magic'){
      performCharacterMagic(p);
      if(checkVictory()) return;
      continue;
    }
    performCharacterAttack(p);
    if(checkVictory()) return;
  }
  enemyTurn();
}
function performCharacterAttack(p){
  const target=firstEnemy(); if(!target) return;
  let chance = p.position==='front' ? .86 : .58;
  if(p.job==='弓手') chance=.84;
  if(p.status==='疲労') chance-=.08;
  if(Math.random()>chance){ addLog(p.name+'の攻撃は外れた。'); return; }
  let base=p.atk + rand(0,3) - target.def;
  if(p.position==='back' && p.job!=='弓手') base=Math.floor(base*.50);
  const dmg=Math.max(1,base);
  target.hp=Math.max(0,target.hp-dmg);
  addLog(p.name+'の攻撃。'+target.name+'に'+dmg+'ダメージ。');
  if(target.hp<=0) addLog(target.name+'を倒した。');
}
function performCharacterMagic(p){
  if(p.job==='司祭'){
    if(p.mp<3){ addLog(p.name+'は祈りを唱えられない。'); return; }
    const wounded=state.party.filter(x=>x.hp>0 && x.hp<x.maxHp).sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp))[0];
    if(wounded){
      p.mp-=3; const heal=8+p.level*4+rand(0,2);
      wounded.hp=Math.min(wounded.maxHp,wounded.hp+heal);
      addLog(p.name+'が癒しの祈りを唱えた。'+wounded.name+'のHPが'+heal+'回復。');
      return;
    }
    p.mp-=3;
    const target=firstEnemy();
    if(target){ const dmg=4+p.level*2; target.hp=Math.max(0,target.hp-dmg); addLog(p.name+'が聖句を唱えた。'+target.name+'に'+dmg+'ダメージ。'); if(target.hp<=0) addLog(target.name+'を倒した。'); }
    return;
  }
  if(p.job==='魔術師'){
    if(p.mp<4){ addLog(p.name+'は術を唱えられない。'); return; }
    p.mp-=4;
    addLog(p.name+'が火花の術を放った。');
    enemyAlive().forEach(e=>{ const dmg=5+p.level*3+rand(0,3); e.hp=Math.max(0,e.hp-dmg); addLog(e.name+'に'+dmg+'ダメージ。'); if(e.hp<=0) addLog(e.name+'を倒した。'); });
    return;
  }
  if(p.job==='弓手' && p.mp>=2){
    p.mp-=2;
    const target=firstEnemy();
    if(target){ const dmg=Math.max(2,p.atk+3+rand(0,3)-target.def); target.hp=Math.max(0,target.hp-dmg); addLog(p.name+'が集中射を放った。'+target.name+'に'+dmg+'ダメージ。'); if(target.hp<=0) addLog(target.name+'を倒した。'); }
    return;
  }
  addLog(p.name+'は使える魔法を持たない。');
}
function enemyTurn(){
  enemyAlive().forEach(e=>{
    const targets=(frontAlive().length ? frontAlive() : aliveParty());
    if(!targets.length) return;
    const target=pick(targets);
    let dmg=Math.max(1, e.atk + rand(0,3) - target.def);
    if(state.battle.guards && state.battle.guards[target.id]) dmg=Math.max(1,Math.floor(dmg*.45));
    target.hp=Math.max(0,target.hp-dmg);
    if(target.hp<=0){ target.status='倒'; addLog(e.name+'の攻撃。'+target.name+'は倒れた。'); }
    else addLog(e.name+'の攻撃。'+target.name+'は'+dmg+'ダメージを受けた。');
  });
  if(allDead()){ defeat(); return; }
  state.battle.turn++;
  state.battle.commands={};
  state.battle.guards={};
  saveGame(); render();
}
function checkVictory(){
  if(enemyAlive().length>0) return false;
  victory(); return true;
}
function victory(){
  const enemies=state.battle.enemies;
  addLog('敵を倒した。');
  const exp=enemies.reduce((a,e)=>a+e.exp,0);
  const gold=enemies.reduce((a,e)=>a+rand(e.gold[0],e.gold[1]),0);
  aliveParty().forEach(p=>p.exp+=exp);
  state.gold+=gold;
  addLog('経験値 '+exp+' を得た。');
  addLog('金 '+gold+' を得た。');
  const normal=pick(['heal_potion','old_coin','bronze_knife','leather_guard']); addItem(normal); addLog(getItemName(normal)+'を得た。');
  const unknown=pick(Object.keys(DATA.unidentified)); addUnidentified(unknown); addLog(DATA.unidentified[unknown].tempName+'を得た。');
  state.battle=null; state.screen='dungeon';
  saveGame(); render();
}
function defeat(){
  addLog('全員が倒れた。');
  const lost=Math.floor(state.gold*.35); state.gold-=lost;
  state.party.forEach(p=>{ p.hp=Math.max(1,Math.floor(p.maxHp*.35)); p.mp=0; p.status='疲労'; });
  addLog('通行人に助けられ、街へ戻された。金 '+lost+' を失った。');
  state.battle=null; state.screen='city'; saveGame(); render();
}

function restInnChar(charId){
  const p=state.party.find(x=>x.id===charId);
  if(!p) return;
  const cost=6+p.level*3;
  if(state.gold<cost){ addLog(p.name+'を泊める金が足りない。必要な金は '+cost+'。'); saveGame(); render(); return; }
  state.gold-=cost;
  addLog(p.name+'を宿に泊めた。宿代 '+cost+' を支払った。');
  p.hp=p.maxHp; p.mp=p.maxMp; if(p.status==='倒'||p.status==='疲労') p.status='正常';
  addLog(p.name+'のHPとMPが回復した。');
  let levels=0;
  while(p.exp>=nextExp(p.level) && levels<3){
    p.level++; levels++;
    const hpGain = p.job==='守人'?rand(6,9):p.job==='魔術師'?rand(2,4):p.job==='司祭'?rand(3,5):rand(4,7);
    const mpGain = (p.job==='魔術師'||p.job==='司祭')?rand(3,5):(p.job==='弓手'?rand(0,2):0);
    const atkGain = (p.job==='剣士'||p.job==='盗賊'||p.job==='弓手')?rand(1,2):rand(0,1);
    const defGain = (p.job==='守人'||p.job==='剣士')?rand(1,2):rand(0,1);
    p.maxHp+=hpGain; p.maxMp+=mpGain; p.atk+=atkGain; p.def+=defGain; p.hp=p.maxHp; p.mp=p.maxMp;
    addLog(p.name+'はLv'+p.level+'になった。');
    addLog('最大HP +'+hpGain+' / 最大MP +'+mpGain+' / 攻撃 +'+atkGain+' / 防御 +'+defGain);
  }
  if(levels===0) addLog(p.name+'はまだレベルアップしない。');
  saveGame(); render();
}
function restInn(){ addLog('宿屋では泊める人物を選ぶ。'); saveGame(); render(); }

function buyItem(id){
  const offer=DATA.shop.find(s=>s.itemId===id); if(!offer) return;
  if(state.gold<offer.price){ addLog('金が足りない。'); saveGame(); render(); return; }
  state.gold-=offer.price; addItem(id); addLog(getItemName(id)+'を購入した。'); saveGame(); render();
}
function sellItem(id){
  if(!removeOneInventory(id)){ addLog('売る品がない。'); saveGame(); render(); return; }
  const price=Math.max(1,Math.floor(itemValue(id)*0.5)); state.gold+=price; addLog(getItemName(id)+'を売った。金 '+price+' を得た。'); saveGame(); render();
}
function identify(uid){
  const idx=state.unidentified.findIndex(u=>u.uid===uid); if(idx<0) return;
  const target=state.unidentified[idx]; const cost=18;
  if(state.gold<cost){ addLog('鑑定料が足りない。'); saveGame(); render(); return; }
  state.gold-=cost; state.unidentified.splice(idx,1); addItem(target.itemId);
  const item=DATA.items[target.itemId];
  addLog(target.tempName+'を鑑定した。'); addLog('正式名称は「'+item.name+'」。');
  if(item.unique) addLog('固有品として記録された。');
  saveGame(); render();
}
function useItem(id){
  if(id==='heal_potion'){
    const t=state.party.filter(p=>p.hp>0 && p.hp<p.maxHp).sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp))[0];
    if(!t){ addLog('今は小治癒薬を使う必要がない。'); render(); return; }
    removeOneInventory(id); t.hp=Math.min(t.maxHp,t.hp+18); addLog('小治癒薬を使った。'+t.name+'のHPが回復した。'); saveGame(); render(); return;
  }
  if(id==='tonic'){
    const t=state.party.filter(p=>p.mp<p.maxMp).sort((a,b)=>(a.mp/a.maxMp)-(b.mp/b.maxMp))[0];
    if(!t){ addLog('今は澄んだ薬瓶を使う必要がない。'); render(); return; }
    removeOneInventory(id); t.mp=Math.min(t.maxMp,t.mp+5); addLog('澄んだ薬瓶を使った。'+t.name+'のMPが回復した。'); saveGame(); render(); return;
  }
  addLog('この品はここでは使えない。'); render();
}

function header(title){
  let meta='';
  if(state){
    if(state.screen==='dungeon'||state.screen==='battle') meta=state.location.floor+' '+state.location.x+','+state.location.y+' '+DIRS[state.location.dir]+' / 金 '+state.gold;
    else meta='金 '+state.gold+' / '+(state.unidentified.length?'未鑑定 '+state.unidentified.length:'未鑑定なし');
  } else meta=safeLoadNotice();
  return '<div class="header"><div class="title">'+esc(title)+'</div><div class="meta">'+esc(meta)+'</div></div>';

function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function actions(buttons, cls){ return '<div class="actions '+(cls||'')+'">'+buttons.map(b=>'<button class="btn '+(b.class||'')+'" data-act="'+b.act+'" '+(b.arg?'data-arg="'+esc(b.arg)+'"':'')+' '+(b.disabled?'disabled':'')+'>'+esc(b.label)+'</button>').join('')+'</div>'; }

function partySummary(){
  const front=state.party.filter(p=>p.position==='front'), back=state.party.filter(p=>p.position==='back');

}

function renderParty(){
  const rows=state.party.map(p=>'<tr><td>'+esc(p.position==='front'?'前衛':'後衛')+'</td><td>'+esc(p.name)+'</td><td>'+esc(p.race)+'</td><td>'+esc(p.job)+'</td><td>Lv'+p.level+'</td><td>'+p.exp+' / '+nextExp(p.level)+'</td><td>'+p.hp+'/'+p.maxHp+'</td><td>'+p.mp+'/'+p.maxMp+'</td><td>'+p.atk+'</td><td>'+p.def+'</td><td>'+esc(p.status)+'</td></tr>').join('');
  app.innerHTML=header('パーティ確認')+'<div class="main"><div class="menu-scroll"><div class="panel"><table class="table"><thead><tr><th>列</th><th>名</th><th>種族</th><th>職業</th><th>Lv</th><th>経験値</th><th>HP</th><th>MP</th><th>攻</th><th>防</th><th>状態</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'+logHtml()+'</div>'+actions([{label:'街へ戻る',act:'city'},{label:'宿屋',act:'screen',arg:'inn'},{label:'アイテム',act:'screen',arg:'items'}]);
  scrollLog();
}
function renderItems(){
  const normal=[...new Set(state.inventory)].map(id=>'<div class="item-row"><div class="info"><div class="name">'+esc(getItemName(id))+' × '+countInventory(id)+' <span class="note">'+esc(DATA.items[id].type)+'</span></div><div class="desc">'+esc(DATA.items[id].desc)+'</div></div>'+(DATA.items[id].usable?'<button class="btn small-btn" data-act="useItem" data-arg="'+id+'">使う</button>':'')+'</div>').join('') || '<div class="note">所持品はない。</div>';
  const unknown=state.unidentified.map(u=>'<div class="item-row"><div class="info"><div class="name">'+esc(u.tempName)+'</div><div class="desc">鑑定所で正式名称が分かる。</div></div></div>').join('') || '<div class="note">未鑑定品はない。</div>';
  app.innerHTML=header('アイテム')+'<div class="main"><div class="menu-scroll"><div class="panel"><div class="section-title">所持品</div>'+normal+'</div><div class="panel"><div class="section-title">未鑑定品</div>'+unknown+'</div><div class="panel"><div class="section-title">固有品記録</div><div class="note">'+(state.catalog.map(id=>'・'+getItemName(id)).join('<br>')||'まだ記録はない。')+'</div></div></div>'+logHtml()+'</div>'+actions([{label:'街へ戻る',act:'city'},{label:'鑑定所',act:'screen',arg:'identify'},{label:'商店',act:'screen',arg:'shop'}]);
  scrollLog();
}
function renderReset(){
  app.innerHTML=header('保存初期化')+'<div class="main"><div class="menu-scroll"><div class="panel reset-box"><div class="section-title">保存データ初期化</div><div class="note">LocalStorageの保存データを削除する。次回は新規開始からになる。</div></div></div>'+logHtml()+'</div>'+actions([{label:'初期化する',act:'reset',class:'danger'},{label:'街へ戻る',act:'city'}],'two');
}
function runDiagnostics(){
  const cssText=[...document.styleSheets].map(s=>{try{return [...s.cssRules].map(r=>r.cssText).join('\n')}catch(e){return ''}}).join('\n');
  const screens=['city','dungeon','battle','inn','shop','identify','party','items','reset','diagnostics'];
  return [
    ['パーティ人数', DATA.party.length===6, '初期パーティが6人'],
    ['前衛後衛', DATA.party.filter(p=>p.position==='front').length===3 && DATA.party.filter(p=>p.position==='back').length===3, '前衛3人・後衛3人'],
    ['迷宮データ', DATA.map && DATA.map.floor==='地下1階' && DATA.map.rows.length>0, '地下1階マップあり'],
    ['敵データ', Object.keys(DATA.enemies).length>=2, '敵が複数存在'],
    ['アイテムデータ', Object.values(DATA.items).some(i=>i.type==='通常') && Object.values(DATA.items).filter(i=>i.unique).length>=5, '通常品と固有品5個以上'],
    ['未鑑定品', Object.keys(DATA.unidentified).length>0, '未鑑定品テンプレートあり'],
    ['施設', DATA.facilities.includes('宿屋') && DATA.facilities.includes('商店') && DATA.facilities.includes('鑑定所'), '宿屋・商店・鑑定所あり'],
    ['セーブ', typeof saveGame==='function' && typeof loadSave==='function' && typeof localStorage!=='undefined', 'LocalStorage処理あり'],
    ['画面遷移', screens.every(Boolean), '街・迷宮・戦闘・施設画面の描画関数あり'],
    ['横スクロール対策', cssText.includes('overflow:hidden') && cssText.includes('max-width:540px'), 'CSS上の横スクロール抑制あり']
  ];
}
function renderDiagnostics(){
  const rows=runDiagnostics().map(r=>'<tr><td>'+esc(r[0])+'</td><td class="'+(r[1]?'diag-pass':'diag-fail')+'">'+(r[1]?'OK':'NG')+'</td><td>'+esc(r[2])+'</td></tr>').join('');
  const fails=runDiagnostics().filter(r=>!r[1]).length;
  app.innerHTML=header('自己診断')+'<div class="main"><div class="menu-scroll"><div class="panel"><div class="section-title">HTML内自己診断</div><div class="note">これは実機確認の代替ではない。構造破綻を検出するための内部診断。</div><table class="table"><thead><tr><th>項目</th><th>判定</th><th>根拠</th></tr></thead><tbody>'+rows+'</tbody></table><p class="'+(fails?'bad':'good')+'">'+(fails?'NG '+fails+'件':'全項目OK')+'</p></div></div>'+(state?logHtml():'')+'</div>'+actions([{label:state?'街へ戻る':'タイトル',act:state?'city':'title'}],'one');
  scrollLog();
}

function drawDungeon(){
  const c=document.getElementById('dungeonCanvas'); if(!c || !state) return;
  const box=c.getBoundingClientRect(); const dpr=window.devicePixelRatio||1;
  c.width=Math.max(1,Math.floor(box.width*dpr)); c.height=Math.max(1,Math.floor(box.height*dpr));
  const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0);
  const w=box.width,h=box.height; ctx.clearRect(0,0,w,h);
  const line=getComputedStyle(document.documentElement).getPropertyValue('--line').trim()||'#9c936f';
  const accent=getComputedStyle(document.documentElement).getPropertyValue('--accent').trim()||'#f0d978';
  ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h);
  const horizon=h*.48;
  const ceil=ctx.createLinearGradient(0,0,0,horizon); ceil.addColorStop(0,'#040403'); ceil.addColorStop(1,'#11100b'); ctx.fillStyle=ceil; ctx.fillRect(0,0,w,horizon);
  const floor=ctx.createLinearGradient(0,horizon,0,h); floor.addColorStop(0,'#080806'); floor.addColorStop(1,'#020202'); ctx.fillStyle=floor; ctx.fillRect(0,horizon,w,h-horizon);
  ctx.strokeStyle='rgba(156,147,111,.25)'; ctx.lineWidth=1;
  for(let i=1;i<=7;i++){
    const y=horizon+(h-horizon)*(i*i/56);
    ctx.beginPath(); ctx.moveTo(8,y); ctx.lineTo(w-8,y); ctx.stroke();
  }
  for(const x of [w*.12,w*.28,w*.5,w*.72,w*.88]){
    ctx.beginPath(); ctx.moveTo(w*.5,horizon); ctx.lineTo(x,h-8); ctx.stroke();
  }
  const frames=[
    {l:8,r:w-8,t:8,b:h-8},
    {l:w*.16,r:w*.84,t:h*.19,b:h*.82},
    {l:w*.30,r:w*.70,t:h*.34,b:h*.68},
    {l:w*.405,r:w*.595,t:h*.435,b:h*.575},
    {l:w*.475,r:w*.525,t:h*.493,b:h*.507}
  ];
  ctx.lineWidth=2; ctx.strokeStyle=line; ctx.strokeRect(3,3,w-6,h-6);
  ctx.lineWidth=1;
  for(let i=0;i<4;i++){
    const a=frames[i], b=frames[i+1];
    ctx.strokeStyle='rgba(156,147,111,.50)';
    linePath([[a.l,a.t],[b.l,b.t],[b.r,b.t],[a.r,a.t]]);
    linePath([[a.l,a.b],[b.l,b.b],[b.r,b.b],[a.r,a.b]]);
    ctx.strokeStyle='rgba(156,147,111,.26)';
    linePath([[a.l,(a.t+a.b)/2],[b.l,(b.t+b.b)/2]]);
    linePath([[a.r,(a.t+a.b)/2],[b.r,(b.t+b.b)/2]]);
  }
  const loc=state.location;
  let blockedAt=-1;
  for(let depth=0; depth<4; depth++){
    const here=stepPos(loc.x,loc.y,loc.dir,depth);
    const next=stepPos(loc.x,loc.y,loc.dir,depth+1);
    const f=frames[depth], n=frames[depth+1];
    const left=sidePos(here.x,here.y,loc.dir,-1); const right=sidePos(here.x,here.y,loc.dir,1);
    const alpha=Math.max(.22,.62-depth*.12);
    if(isWall(left.x,left.y)){
      drawSideWall(f,n,'left',alpha);
    }else{
      drawSideOpening(f,n,'left',depth);
    }
    if(isWall(right.x,right.y)){
      drawSideWall(f,n,'right',alpha);
    }else{
      drawSideOpening(f,n,'right',depth);
    }
    if(isWall(next.x,next.y)){ blockedAt=depth+1; drawFront(frames[depth+1], depth+1); break; }
    const ch=cellAt(next.x,next.y);
    if(ch==='D') drawDoor(frames[depth+1], depth+1);
    if(ch==='C') drawChest(frames[depth+1], depth+1);
    if(ch==='R') drawStairs(frames[depth+1], depth+1);
  }
  if(blockedAt<0){
    const last=frames[4]; ctx.strokeStyle='rgba(156,147,111,.45)'; ctx.strokeRect(last.l,last.t,Math.max(2,last.r-last.l),Math.max(2,last.b-last.t));
  }
  drawCompass();

  function drawSideWall(f,n,side,alpha){
    const pts=side==='left'?[[f.l,f.t],[n.l,n.t],[n.l,n.b],[f.l,f.b]]:[[f.r,f.t],[n.r,n.t],[n.r,n.b],[f.r,f.b]];
    fillPoly(pts,'rgba(20,19,14,'+alpha+')');
    strokePoly(pts,line);
    ctx.strokeStyle='rgba(240,217,120,.15)';
    for(let i=1;i<=3;i++){
      const t=i/4;
      const x1=lerp(pts[0][0],pts[1][0],t), y1=lerp(pts[0][1],pts[1][1],t);
      const x2=lerp(pts[3][0],pts[2][0],t), y2=lerp(pts[3][1],pts[2][1],t);
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    }
  }
  function drawSideOpening(f,n,side,depth){
    const nearX=side==='left'?f.l:f.r, farX=side==='left'?n.l:n.r;
    const midY=(f.t+f.b)/2, farMidY=(n.t+n.b)/2;
    ctx.strokeStyle='rgba(240,217,120,.70)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(nearX,midY); ctx.lineTo(farX,farMidY); ctx.stroke();
    ctx.strokeStyle='rgba(156,147,111,.32)'; ctx.lineWidth=1;
    if(side==='left'){
      fillPoly([[f.l,f.t],[n.l,n.t],[n.l,farMidY],[f.l,midY]], 'rgba(0,0,0,.35)');
      fillPoly([[f.l,midY],[n.l,farMidY],[n.l,n.b],[f.l,f.b]], 'rgba(0,0,0,.25)');
    }else{
      fillPoly([[f.r,f.t],[n.r,n.t],[n.r,farMidY],[f.r,midY]], 'rgba(0,0,0,.35)');
      fillPoly([[f.r,midY],[n.r,farMidY],[n.r,n.b],[f.r,f.b]], 'rgba(0,0,0,.25)');
    }
    if(depth===0){
      ctx.fillStyle='rgba(240,217,120,.55)';
      ctx.beginPath(); ctx.arc(nearX+(side==='left'?10:-10), midY, 2.2, 0, Math.PI*2); ctx.fill();
    }
  }
  function drawFront(fr,depth){
    fillPoly([[fr.l,fr.t],[fr.r,fr.t],[fr.r,fr.b],[fr.l,fr.b]], depth<2?'#11100c':'#090908');
    strokePoly([[fr.l,fr.t],[fr.r,fr.t],[fr.r,fr.b],[fr.l,fr.b]], line);
    ctx.strokeStyle='rgba(156,147,111,.25)';
    const rows=depth<2?5:3;
    for(let i=1;i<rows;i++){ const y=lerp(fr.t,fr.b,i/rows); ctx.beginPath(); ctx.moveTo(fr.l,y); ctx.lineTo(fr.r,y); ctx.stroke(); }
    const cols=depth<2?4:2;
    for(let i=1;i<cols;i++){ const x=lerp(fr.l,fr.r,i/cols); ctx.beginPath(); ctx.moveTo(x,fr.t); ctx.lineTo(x,fr.b); ctx.stroke(); }
    ctx.strokeStyle='rgba(240,217,120,.22)'; ctx.beginPath(); ctx.moveTo(fr.l,fr.t); ctx.lineTo(fr.r,fr.b); ctx.moveTo(fr.r,fr.t); ctx.lineTo(fr.l,fr.b); ctx.stroke();
  }
  function drawDoor(fr,depth){
    const cx=(fr.l+fr.r)/2, top=fr.t, bottom=fr.b, ww=(fr.r-fr.l)*(depth<2?.42:.52), hh=(bottom-top)*.66;
    const y=top+(bottom-top)*.18;
    ctx.fillStyle='rgba(5,5,4,.72)'; ctx.fillRect(cx-ww/2,y,ww,hh);
    ctx.strokeStyle='rgba(240,217,120,.78)'; ctx.lineWidth=1.5; ctx.strokeRect(cx-ww/2,y,ww,hh);
    ctx.beginPath(); ctx.moveTo(cx,y); ctx.lineTo(cx,y+hh); ctx.stroke();
    ctx.fillStyle='rgba(240,217,120,.75)'; ctx.beginPath(); ctx.arc(cx+ww*.28,y+hh*.52,Math.max(1.5,ww*.025),0,Math.PI*2); ctx.fill();
    ctx.lineWidth=1;
  }
  function drawChest(fr,depth){
    const cx=(fr.l+fr.r)/2, cy=fr.b-(fr.b-fr.t)*.15, ww=Math.max(14,(fr.r-fr.l)*(depth<2?.26:.34)), hh=Math.max(8,(fr.b-fr.t)*.12);
    ctx.fillStyle='rgba(18,13,5,.8)'; ctx.fillRect(cx-ww/2,cy-hh,ww,hh);
    ctx.strokeStyle=accent; ctx.strokeRect(cx-ww/2,cy-hh,ww,hh);
    ctx.beginPath(); ctx.moveTo(cx-ww/2,cy-hh); ctx.quadraticCurveTo(cx,cy-hh*1.8,cx+ww/2,cy-hh); ctx.stroke();
    ctx.fillStyle=accent; ctx.fillRect(cx-2,cy-hh*.64,4,3);
  }
  function drawStairs(fr,depth){
    ctx.strokeStyle='rgba(183,233,173,.76)'; const cx=(fr.l+fr.r)/2; const base=fr.b-(fr.b-fr.t)*.08;
    for(let i=0;i<5;i++){ const y=base-(i+1)*(fr.b-fr.t)*.105; const ww=(fr.r-fr.l)*(.16+i*.085); ctx.beginPath(); ctx.moveTo(cx-ww/2,y); ctx.lineTo(cx+ww/2,y); ctx.stroke(); }
    ctx.strokeStyle='rgba(183,233,173,.38)'; ctx.beginPath(); ctx.moveTo(cx-(fr.r-fr.l)*.25,base); ctx.lineTo(cx,fr.t+(fr.b-fr.t)*.25); ctx.lineTo(cx+(fr.r-fr.l)*.25,base); ctx.stroke();
  }
  function drawCompass(){
    const cx=w-28, cy=24; ctx.strokeStyle='rgba(240,217,120,.7)'; ctx.fillStyle='rgba(0,0,0,.55)';
    ctx.beginPath(); ctx.arc(cx,cy,15,0,Math.PI*2); ctx.fill(); ctx.stroke();
    const a=(state.location.dir-1)*Math.PI/2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(a)*11,cy+Math.sin(a)*11); ctx.stroke();
    ctx.fillStyle='rgba(236,231,207,.75)'; ctx.font='10px system-ui'; ctx.textAlign='center'; ctx.fillText(DIRS[state.location.dir],cx,cy+27);
  }
  function linePath(points){ ctx.beginPath(); ctx.moveTo(points[0][0],points[0][1]); for(let i=1;i<points.length;i++) ctx.lineTo(points[i][0],points[i][1]); ctx.stroke(); }
  function fillPoly(points,color){ ctx.fillStyle=color; ctx.beginPath(); ctx.moveTo(points[0][0],points[0][1]); for(let i=1;i<points.length;i++) ctx.lineTo(points[i][0],points[i][1]); ctx.closePath(); ctx.fill(); }
  function strokePoly(points,color){ ctx.strokeStyle=color; ctx.beginPath(); ctx.moveTo(points[0][0],points[0][1]); for(let i=1;i<points.length;i++) ctx.lineTo(points[i][0],points[i][1]); ctx.closePath(); ctx.stroke(); }
  function lerp(a,b,t){ return a+(b-a)*t; }
}

function scrollLog(){ setTimeout(()=>{ const el=document.getElementById('logbox'); if(el) el.scrollTop=el.scrollHeight; },0); }
function setScreen(name){ if(!state && name==='diagnostics'){ state={screen:'diagnostics',version:DATA.version,party:clone(DATA.party),inventory:[],unidentified:[],log:[],gold:0,location:clone(DATA.map.start),catalog:[],chests:clone(DATA.map.chests),flags:{}}; renderDiagnostics(); state=null; return; } if(!state) return; state.screen=name; saveGame(); render(); }
function handleAction(act,arg){
  if(act==='new') return createNewState();
  if(act==='continue') return continueGame();
  if(act==='title') return renderTitle();
  if(act==='diagnostics'){ if(state){state.screen='diagnostics'; render();} else renderDiagnostics(); return; }
  if(act==='reset'){ if(confirm('保存データを初期化しますか？')) resetSave(); return; }
  if(act==='screen') return setScreen(arg);
  if(act==='city') return goCity('街へ戻った。');
  if(!state) return;
  if(act==='enterDungeon') return enterDungeon();
  if(act==='forward') return moveForward();
  if(act==='back') return moveBack();
  if(act==='turnLeft') return turn(-1);
  if(act==='turnRight') return turn(1);
  if(act==='inspect') return inspectCell();
  if(act==='battleCommand') return setBattleCommand(arg);
  if(act==='restChar') return restInnChar(arg);
  if(act==='rest') return restInn();
  if(act==='buy') return buyItem(arg);
  if(act==='sell') return sellItem(arg);
  if(act==='identify') return identify(arg);
  if(act==='useItem') return useItem(arg);
  console.error('Unknown action:', act, arg);
  if(state){ addLog('未対応の操作: '+act, 'bad'); render(); }
}
app.addEventListener('click', e=>{ const b=e.target.closest('[data-act]'); if(!b || b.disabled) return; handleAction(b.dataset.act,b.dataset.arg); });

window.__DRPG_TEST__={DATA,runDiagnostics,loadSave,validateSave,KEY,handleAction,getState:()=>state};
renderTitle();
})();
</script>
