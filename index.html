<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>タイトル未定 地下方舟3Dダンジョン試作 v23g</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="stylesheet" href="style.css?v=20260612-v23g" />
</head>
<body>
  <main class="app-shell">
    <section class="viewport-panel" aria-label="3Dダンジョン表示">
      <canvas id="dungeonCanvas" aria-label="WebGL 3D dungeon viewport"></canvas>
      <div class="hud hud-top">
        <div class="hud-title">タイトル未定 / 地下方舟3Dダンジョン試作 v23g</div>
        <div id="positionText" class="hud-position">B1F x0 y0 N</div>
      </div>
      <div id="statusToast" class="status-toast" role="status" aria-live="polite" hidden></div>
    </section>

    <section class="party-panel wizardry-party-panel" aria-label="パーティ状態">
      <div class="party-card-grid" id="explorePartyCards" aria-label="パーティ状態カード"></div>
    </section>

    <section class="command-panel" aria-label="操作">
      <div class="action-row">
        <button id="campBtn" class="cmd-btn">キャンプ</button>
        <button id="inspectBtn" class="cmd-btn primary">調べる</button>
        <button id="formationBtn" class="cmd-btn">隊列</button>
      </div>
      <div class="move-pad" aria-label="移動操作">
        <button id="turnLeftBtn" class="move-btn side">←</button>
        <button id="forwardBtn" class="move-btn main">↑</button>
        <button id="turnRightBtn" class="move-btn side">→</button>
        <button id="backBtn" class="move-btn back">↓</button>
      </div>
      <div class="debug-row four">
        <button id="resetBtn" class="small-btn">初期位置</button>
        <button id="mapBtn" class="small-btn">簡易マップ</button>
        <button id="detectTrapBtn" class="small-btn">罠検知</button>
        <button id="encounterBtn" class="small-btn">戦闘確認</button>
      </div>
    </section>
  </main>
  <script src="app.js?v=20260612-v23g"></script>
</body>
</html>
