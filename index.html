<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>灰の目録 3Dダンジョン試作 v01</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="viewport-panel" aria-label="3Dダンジョン表示">
      <canvas id="dungeonCanvas" aria-label="WebGL 3D dungeon viewport"></canvas>
      <div class="hud hud-top">
        <div class="hud-title">灰の目録 / 3Dダンジョン試作</div>
        <div id="positionText" class="hud-position">B1F x0 y0 N</div>
      </div>
      <div id="messageLog" class="message-log" aria-live="polite"></div>
    </section>

    <section class="party-panel" aria-label="パーティ状態">
      <div class="party-grid">
        <div class="member front"><span>前</span><strong>アデル</strong><em>HP 34/34</em></div>
        <div class="member front"><span>前</span><strong>ミラ</strong><em>HP 28/28</em></div>
        <div class="member front"><span>前</span><strong>ガルド</strong><em>HP 41/41</em></div>
        <div class="member rear"><span>後</span><strong>セリン</strong><em>MP 18/18</em></div>
        <div class="member rear"><span>後</span><strong>ロウ</strong><em>MP 12/12</em></div>
        <div class="member rear"><span>後</span><strong>ネネ</strong><em>MP 21/21</em></div>
      </div>
    </section>

    <section class="command-panel" aria-label="操作">
      <div class="action-row">
        <button id="campBtn" class="cmd-btn">キャンプ</button>
        <button id="inspectBtn" class="cmd-btn primary">調べる</button>
        <button id="formationBtn" class="cmd-btn">隊列</button>
      </div>
      <div class="move-pad" aria-label="移動操作">
        <button id="turnLeftBtn" class="move-btn side">←</button>
        <button id="forwardBtn" class="move-btn main">↑</button>
        <button id="turnRightBtn" class="move-btn side">→</button>
        <button id="backBtn" class="move-btn back">↓</button>
      </div>
      <div class="debug-row">
        <button id="resetBtn" class="small-btn">初期位置</button>
        <button id="mapBtn" class="small-btn">簡易マップ</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
