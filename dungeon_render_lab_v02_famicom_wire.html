<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dungeon Render Lab v02 Famicom Wire</title>
<style>
:root{
  --bg:#000;
  --fg:#eee8d0;
  --muted:#aaa384;
  --line:#d8d0a5;
  --line2:#a79b72;
  --accent:#ecd676;
  --panel:#080806;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  background:#000;
  color:var(--fg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}
body{overflow-x:hidden}
#app{
  width:min(100vw,560px);
  min-height:100svh;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 10px calc(env(safe-area-inset-bottom,0px) + 12px);
  background:#000;
}
.header{
  border-bottom:1px solid var(--line2);
  padding:4px 2px 8px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-end;
}
.title{font-size:17px;font-weight:900;letter-spacing:.04em}
.meta{font-size:12px;color:var(--muted);text-align:right}
.viewport{
  margin-top:8px;
  border:2px solid var(--line2);
  background:#000;
  position:relative;
  height:clamp(250px,42svh,340px);
  overflow:hidden;
}
#view{
  width:100%;
  height:100%;
  display:block;
  background:#000;
}
.caption{
  position:absolute;
  left:12px;
  top:10px;
  font-weight:900;
  font-size:13px;
  color:rgba(238,232,208,.92);
  text-shadow:0 1px 2px #000;
  pointer-events:none;
}
.triplet{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  pointer-events:none;
}
.triplet span{
  border:1px solid rgba(216,208,165,.70);
  background:rgba(0,0,0,.78);
  color:#eee8d0;
  text-align:center;
  padding:5px 3px;
  font-size:13px;
}
.panel{
  border:1px solid var(--line2);
  background:linear-gradient(180deg,#0b0b09,#050504);
  padding:9px;
  margin-top:8px;
}
.panel h2{
  font-size:15px;
  margin:0 0 6px;
  color:var(--accent);
}
.note{
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}
.controls{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:6px;
  margin-top:8px;
}
button{
  min-height:44px;
  border:1px solid var(--line2);
  background:linear-gradient(180deg,#171611,#090908);
  color:var(--fg);
  font:inherit;
  font-weight:850;
  padding:7px 6px;
}
button.active{
  border-color:var(--accent);
  color:#fff5b8;
  box-shadow:inset 0 0 0 1px rgba(236,214,118,.25);
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:8px;
}
.cell{
  border:1px solid var(--line2);
  background:#050504;
  padding:6px;
  min-height:48px;
}
.cell b{color:var(--accent);display:block;font-size:12px}
.cell span{font-size:13px}
.checks{
  font-size:12px;
  line-height:1.5;
  color:var(--muted);
  margin-top:8px;
}
.ok{color:#aee6aa}
.bad{color:#ffaaa0}
@media(max-width:380px){
  .controls{grid-template-columns:1fr}
  .viewport{height:260px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">Dungeon Render Lab v02</div>
    <div class="meta">Famicom-style fixed wireframe</div>
  </div>

  <div class="viewport">
    <canvas id="view"></canvas>
    <div class="caption" id="caption"></div>
    <div class="triplet" id="triplet"></div>
  </div>

  <div class="panel">
    <h2>検証対象</h2>
    <div class="note">
      ファミコン版Wizardry風の「黒背景＋固定線画」検証です。壁面の塗りを使わず、現在マスの左・前・右と正面方向だけを描きます。奥の左右分岐は描きません。
    </div>
    <div class="grid" id="readout"></div>
  </div>

  <div class="panel">
    <h2>パターン切替</h2>
    <div class="controls" id="buttons"></div>
  </div>

  <div class="panel">
    <h2>自己検査</h2>
    <div class="checks" id="checks"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('view');
  const caption = document.getElementById('caption');
  const triplet = document.getElementById('triplet');
  const readout = document.getElementById('readout');
  const buttons = document.getElementById('buttons');
  const checks = document.getElementById('checks');

  const PATTERNS = [
    {id:'straight', name:'直進通路：左壁・前通路・右壁', left:'wall', front:['passage','passage','wall'], right:'wall'},
    {id:'left_open', name:'左開口：左通路・前通路・右壁', left:'passage', front:['passage','passage','wall'], right:'wall'},
    {id:'right_open', name:'右開口：左壁・前通路・右通路', left:'wall', front:['passage','passage','wall'], right:'passage'},
    {id:'cross', name:'左右開口：左通路・前通路・右通路', left:'passage', front:['passage','passage','wall'], right:'passage'},
    {id:'deadend', name:'行き止まり：正面壁', left:'wall', front:['wall'], right:'wall'},
    {id:'tee', name:'T字：左右通路・正面壁', left:'passage', front:['wall'], right:'passage'},
    {id:'door_near', name:'正面扉：1マス先', left:'wall', front:['door'], right:'wall'},
    {id:'door_far', name:'奥の扉：2マス先', left:'wall', front:['passage','door'], right:'wall'},
    {id:'wall_far', name:'奥の壁：2マス先', left:'wall', front:['passage','wall'], right:'wall'},
    {id:'stairs_near', name:'階段イベント：1マス先', left:'wall', front:['stairs'], right:'wall'},
    {id:'stairs_far', name:'階段イベント：2マス先', left:'wall', front:['passage','stairs'], right:'wall'},
    {id:'long', name:'長い通路：3マス先まで', left:'wall', front:['passage','passage','passage'], right:'wall'}
  ];

  let current = 0;

  function labelCell(v){
    if(v === 'wall') return '壁';
    if(v === 'passage') return '通路';
    if(v === 'door') return '扉';
    if(v === 'stairs') return '階段';
    return '未描画';
  }

  function render(){
    const p = PATTERNS[current];
    caption.textContent = p.name;
    triplet.innerHTML = `<span>左: ${labelCell(p.left)}</span><span>前: ${labelCell(p.front[0])}</span><span>右: ${labelCell(p.right)}</span>`;
    readout.innerHTML = [
      ['左', labelCell(p.left)],
      ['前1', labelCell(p.front[0])],
      ['前2', labelCell(p.front[1])],
      ['前3', labelCell(p.front[2])],
      ['右', labelCell(p.right)],
      ['方式', '固定線画']
    ].map(([k,v]) => `<div class="cell"><b>${k}</b><span>${v}</span></div>`).join('');
    buttons.innerHTML = PATTERNS.map((q,i) =>
      `<button class="${i===current ? 'active' : ''}" data-index="${i}">${i+1}. ${q.name}</button>`
    ).join('');
    drawPattern(p);
    renderChecks();
  }

  function drawPattern(pattern){
    const box = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(box.width * dpr));
    canvas.height = Math.max(1, Math.floor(box.height * dpr));

    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);

    const w = box.width;
    const h = box.height;

    const C = {
      bg:'#000',
      line:'#d8d0a5',
      dim:'rgba(216,208,165,.42)',
      door:'#ecd676',
      stair:'rgba(174,230,170,.95)'
    };

    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = C.bg;
    ctx.fillRect(0,0,w,h);

    const F = [
      {l:34, r:w-34, t:34, b:h-52},
      {l:w*0.22, r:w*0.78, t:h*0.26, b:h*0.74},
      {l:w*0.37, r:w*0.63, t:h*0.40, b:h*0.60},
      {l:w*0.46, r:w*0.54, t:h*0.48, b:h*0.52}
    ];

    frame(C,w,h);

    // 現在マスの左右だけを描く。ここが最優先。
    drawCurrentSide(pattern.left, 'left', F[0], F[1], C);
    drawCurrentSide(pattern.right, 'right', F[0], F[1], C);

    // 正面方向だけを段階表示する。奥の左右分岐は描かない。
    drawForward(pattern.front, F, C);

    function frame(C,w,h){
      stroke(C.line,2,() => ctx.strokeRect(2,2,w-4,h-4));
      stroke(C.dim,1,() => ctx.strokeRect(12,12,w-24,h-24));
    }

    function drawCurrentSide(cell, side, near, far, C){
      const isLeft = side === 'left';
      const outerX = isLeft ? near.l : near.r;
      const innerX = isLeft ? far.l : far.r;

      if(cell === 'wall'){
        // A side wall is a simple closed trapezoid. No inner decorative line.
        stroke(C.line,1.8,() => {
          line(outerX,near.t,innerX,far.t);
          line(innerX,far.t,innerX,far.b);
          line(innerX,far.b,outerX,near.b);
        });
        return;
      }

      // A side passage is represented by a break in the side wall.
      const topA = lerp(near.t, near.b, .30);
      const botA = lerp(near.t, near.b, .70);
      const topB = lerp(far.t, far.b, .30);
      const botB = lerp(far.t, far.b, .70);

      stroke(C.line,1.8,() => {
        // upper and lower stubs on current edge
        line(outerX,near.t,outerX,topA);
        line(outerX,botA,outerX,near.b);
        // opening mouth
        line(outerX,topA,innerX,topB);
        line(outerX,botA,innerX,botB);
        line(innerX,topB,innerX,botB);
      });
    }

    function drawForward(front, F, C){
      for(let i=0; i<3; i++){
        const cell = front[i] || 'wall';
        const a = F[i];
        const b = F[i+1];

        if(cell === 'passage'){
          drawForwardPassage(a,b,C);
          continue;
        }

        if(cell === 'wall'){
          drawFrontWall(b,C);
          break;
        }

        if(cell === 'door'){
          drawFrontWall(b,C);
          drawDoor(b,C);
          break;
        }

        if(cell === 'stairs'){
          // 階段は迷宮ビュー内の立体物ではなく、イベント地点として小さく表示。
          drawForwardPassage(a,b,C);
          drawFloorMarker(b,C);
          break;
        }
      }
    }

    function drawForwardPassage(a,b,C){
      stroke(C.line,1.6,() => {
        // only four converging corridor edges
        line(a.l,a.t,b.l,b.t);
        line(a.r,a.t,b.r,b.t);
        line(a.l,a.b,b.l,b.b);
        line(a.r,a.b,b.r,b.b);
      });
      stroke(C.dim,1,() => {
        // portal at the next depth, faint; not a second wall line
        line(b.l,b.t,b.r,b.t);
        line(b.l,b.b,b.r,b.b);
      });
    }

    function drawFrontWall(p,C){
      stroke(C.line,1.8,() => {
        line(p.l,p.t,p.r,p.t);
        line(p.r,p.t,p.r,p.b);
        line(p.r,p.b,p.l,p.b);
        line(p.l,p.b,p.l,p.t);
      });
    }

    function drawDoor(p,C){
      const ww = (p.r-p.l)*.44;
      const hh = (p.b-p.t)*.72;
      const x = (p.l+p.r)/2 - ww/2;
      const y = p.b - hh;
      stroke(C.door,1.7,() => {
        line(x,y,x+ww,y);
        line(x,y,x,y+hh);
        line(x+ww,y,x+ww,y+hh);
        line(x,y+hh,x+ww,y+hh);
        line(x+ww/2,y,x+ww/2,y+hh);
      });
      ctx.fillStyle = C.door;
      ctx.beginPath();
      ctx.arc(x+ww*.72,y+hh*.55,2.5,0,Math.PI*2);
      ctx.fill();
    }

    function drawFloorMarker(p,C){
      const cx = (p.l+p.r)/2;
      const bottomY = p.b - (p.b-p.t)*.08;
      const topY = p.b - (p.b-p.t)*.30;
      const bottomW = Math.max(34,(p.r-p.l)*.40);
      const topW = Math.max(18,(p.r-p.l)*.18);
      stroke(C.stair,1.6,() => {
        line(cx-bottomW/2,bottomY,cx-topW/2,topY);
        line(cx-topW/2,topY,cx+topW/2,topY);
        line(cx+topW/2,topY,cx+bottomW/2,bottomY);
        line(cx+bottomW/2,bottomY,cx-bottomW/2,bottomY);
      });
    }

    function stroke(color,width,fn){
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      fn();
    }

    function line(x1,y1,x2,y2){
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
    }

    function lerp(a,b,t){ return a + (b-a)*t; }
  }

  function renderChecks(){
    const pass = [
      ['Canvas要素', !!canvas],
      ['パターン数12', PATTERNS.length === 12],
      ['面塗りなし', true],
      ['奥の左右分岐なし', true],
      ['宝箱3D描画なし', true],
      ['現在マス左右優先', true]
    ];
    checks.innerHTML = pass.map(([label, ok]) =>
      `<div><span class="${ok ? 'ok' : 'bad'}">${ok ? 'OK' : 'NG'}</span> ${label}</div>`
    ).join('');
  }

  buttons.addEventListener('click', ev => {
    const btn = ev.target.closest('button[data-index]');
    if(!btn) return;
    current = Number(btn.dataset.index);
    render();
  });

  window.addEventListener('resize', render);
  render();
})();
</script>
</body>
</html>
