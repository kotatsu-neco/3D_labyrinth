<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dungeon Render Lab v01</title>
<style>
:root{
  --bg:#000;
  --fg:#eee8d0;
  --muted:#aaa384;
  --line:#a79b72;
  --accent:#ecd676;
  --panel:#080806;
  --wall:#707070;
  --floor:#242424;
  --ceil:#303030;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  background:#000;
  color:var(--fg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}
body{overflow-x:hidden}
#app{
  width:min(100vw,560px);
  min-height:100svh;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 10px calc(env(safe-area-inset-bottom,0px) + 12px);
  background:#000;
}
.header{
  border-bottom:1px solid var(--line);
  padding:4px 2px 8px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-end;
}
.title{font-size:18px;font-weight:900;letter-spacing:.04em}
.meta{font-size:12px;color:var(--muted);text-align:right}
.viewport{
  margin-top:8px;
  border:2px solid var(--line);
  background:#000;
  position:relative;
  height:clamp(250px,42svh,340px);
  overflow:hidden;
}
#view{
  width:100%;
  height:100%;
  display:block;
  background:#000;
}
.caption{
  position:absolute;
  left:12px;
  top:10px;
  font-weight:900;
  font-size:13px;
  color:rgba(238,232,208,.92);
  text-shadow:0 1px 2px #000;
  pointer-events:none;
}
.triplet{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  pointer-events:none;
}
.triplet span{
  border:1px solid rgba(167,155,114,.70);
  background:rgba(0,0,0,.76);
  color:#eee8d0;
  text-align:center;
  padding:5px 3px;
  font-size:13px;
}
.panel{
  border:1px solid var(--line);
  background:linear-gradient(180deg,#0b0b09,#050504);
  padding:9px;
  margin-top:8px;
}
.panel h2{
  font-size:15px;
  margin:0 0 6px;
  color:var(--accent);
}
.note{
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}
.controls{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:6px;
  margin-top:8px;
}
button{
  min-height:44px;
  border:1px solid var(--line);
  background:linear-gradient(180deg,#171611,#090908);
  color:var(--fg);
  font:inherit;
  font-weight:850;
  padding:7px 6px;
}
button.active{
  border-color:var(--accent);
  color:#fff5b8;
  box-shadow:inset 0 0 0 1px rgba(236,214,118,.25);
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:8px;
}
.cell{
  border:1px solid var(--line);
  background:#050504;
  padding:6px;
  min-height:48px;
}
.cell b{color:var(--accent);display:block;font-size:12px}
.cell span{font-size:13px}
.checks{
  font-size:12px;
  line-height:1.5;
  color:var(--muted);
  margin-top:8px;
}
.ok{color:#aee6aa}
.bad{color:#ffaaa0}
@media(max-width:380px){
  .controls{grid-template-columns:1fr}
  .viewport{height:260px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">Dungeon Render Lab v01</div>
    <div class="meta">Canvas 2D / fixed template polygon</div>
  </div>

  <div class="viewport">
    <canvas id="view"></canvas>
    <div class="caption" id="caption"></div>
    <div class="triplet" id="triplet"></div>
  </div>

  <div class="panel">
    <h2>検証対象</h2>
    <div class="note">
      本体ゲームから切り離した、迷宮描画だけの検証HTMLです。奥の左右分岐は描かず、現在マスの左・前・右と、正面奥だけを固定テンプレートで描きます。
    </div>
    <div class="grid" id="readout"></div>
  </div>

  <div class="panel">
    <h2>パターン切替</h2>
    <div class="controls" id="buttons"></div>
  </div>

  <div class="panel">
    <h2>自己検査</h2>
    <div class="checks" id="checks"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('view');
  const caption = document.getElementById('caption');
  const triplet = document.getElementById('triplet');
  const readout = document.getElementById('readout');
  const buttons = document.getElementById('buttons');
  const checks = document.getElementById('checks');

  const PATTERNS = [
    {id:'corridor_lr_wall', name:'基本通路：左壁・前通路・右壁', left:'wall', front:['passage','passage','wall'], right:'wall'},
    {id:'left_open', name:'左通路：左開口・前通路・右壁', left:'passage', front:['passage','passage','wall'], right:'wall'},
    {id:'right_open', name:'右通路：左壁・前通路・右開口', left:'wall', front:['passage','passage','wall'], right:'passage'},
    {id:'cross_current', name:'左右通路：左開口・前通路・右開口', left:'passage', front:['passage','passage','wall'], right:'passage'},
    {id:'deadend', name:'行き止まり：正面壁', left:'wall', front:['wall'], right:'wall'},
    {id:'deadend_side_open', name:'T字：左右通路・正面壁', left:'passage', front:['wall'], right:'passage'},
    {id:'front_door', name:'正面扉：1マス先', left:'wall', front:['door'], right:'wall'},
    {id:'far_door', name:'奥の扉：2マス先', left:'wall', front:['passage','door'], right:'wall'},
    {id:'far_wall', name:'奥の壁：2マス先', left:'wall', front:['passage','wall'], right:'wall'},
    {id:'stairs_near', name:'帰還階段：1マス先', left:'wall', front:['stairs'], right:'wall'},
    {id:'stairs_far', name:'帰還階段：2マス先', left:'wall', front:['passage','stairs'], right:'wall'},
    {id:'long_corridor', name:'長い通路：3マス先まで開通', left:'wall', front:['passage','passage','passage'], right:'wall'}
  ];

  let current = 0;

  function labelCell(v){
    if(v === 'wall') return '壁';
    if(v === 'passage') return '通路';
    if(v === 'door') return '扉';
    if(v === 'stairs') return '階段';
    return '不明';
  }

  function render(){
    const p = PATTERNS[current];
    caption.textContent = p.name;
    triplet.innerHTML = `<span>左: ${labelCell(p.left)}</span><span>前: ${labelCell(p.front[0])}</span><span>右: ${labelCell(p.right)}</span>`;
    readout.innerHTML = [
      ['左', labelCell(p.left)],
      ['前1', labelCell(p.front[0])],
      ['前2', labelCell(p.front[1] || '未描画')],
      ['前3', labelCell(p.front[2] || '未描画')],
      ['右', labelCell(p.right)],
      ['方式', '固定テンプレート']
    ].map(([k,v]) => `<div class="cell"><b>${k}</b><span>${v}</span></div>`).join('');
    buttons.innerHTML = PATTERNS.map((q,i) =>
      `<button class="${i===current ? 'active' : ''}" data-index="${i}">${i+1}. ${q.name}</button>`
    ).join('');
    drawPattern(p);
    renderChecks();
  }

  function drawPattern(pattern){
    const box = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(box.width * dpr));
    canvas.height = Math.max(1, Math.floor(box.height * dpr));

    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);

    const w = box.width;
    const h = box.height;

    const C = {
      bg:'#000',
      line:'#a79b72',
      wall:'rgba(112,112,112,.88)',
      floor:'rgba(32,32,32,.96)',
      ceil:'rgba(38,38,38,.96)',
      dark:'#000',
      door:'#ecd676',
      stair:'rgba(174,230,170,.95)',
      label:'#eee8d0'
    };

    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = C.bg;
    ctx.fillRect(0,0,w,h);

    const F = [
      {l:34, r:w-34, t:34, b:h-52},
      {l:w*0.21, r:w*0.79, t:h*0.25, b:h*0.75},
      {l:w*0.36, r:w*0.64, t:h*0.39, b:h*0.61},
      {l:w*0.45, r:w*0.55, t:h*0.47, b:h*0.53}
    ];

    drawOuterFrame();

    // Determine how many central segments exist.
    const fronts = pattern.front.slice(0,3);
    const segmentCount = getSegmentCount(fronts);

    // Far to near: central corridor only.
    for(let i=segmentCount-1; i>=1; i--){
      drawCentralSegment(F[i], F[i+1], C);
      drawFrontFeature(fronts[i], F[i+1], C);
    }

    // Current segment is special: it includes current left/right surfaces.
    drawCurrentSegment(F[0], F[1], pattern.left, pattern.right, C);
    drawFrontFeature(fronts[0], F[1], C);

    function getSegmentCount(fronts){
      let count = 1;
      for(let i=0; i<fronts.length; i++){
        const cell = fronts[i];
        count = Math.max(count, i+1);
        if(cell !== 'passage') break;
      }
      return Math.min(count, 3);
    }

    function drawOuterFrame(){
      stroke(C.line,2,() => {
        ctx.strokeRect(2,2,w-4,h-4);
      });
      stroke(C.line,1.4,() => {
        ctx.strokeRect(12,12,w-24,h-24);
      });
    }

    function drawCurrentSegment(a,b,left,right,C){
      // Full coherent ceiling/floor surfaces.
      poly([[a.l,a.t],[a.r,a.t],[b.r,b.t],[b.l,b.t]], C.ceil, 'rgba(167,155,114,.55)');
      poly([[a.l,a.b],[a.r,a.b],[b.r,b.b],[b.l,b.b]], C.floor, 'rgba(167,155,114,.55)');

      drawSideSurface(a,b,'left',left,C);
      drawSideSurface(a,b,'right',right,C);

      stroke('rgba(167,155,114,.90)',1.65,() => {
        line(a.l,a.t,b.l,b.t);
        line(a.r,a.t,b.r,b.t);
        line(a.l,a.b,b.l,b.b);
        line(a.r,a.b,b.r,b.b);
      });
    }

    function drawCentralSegment(a,b,C){
      poly([[a.l,a.t],[a.r,a.t],[b.r,b.t],[b.l,b.t]], C.ceil, 'rgba(167,155,114,.45)');
      poly([[a.l,a.b],[a.r,a.b],[b.r,b.b],[b.l,b.b]], C.floor, 'rgba(167,155,114,.45)');
      // Side walls along the forward corridor. These are always walls, because distant side branches are intentionally not drawn.
      poly([[a.l,a.t],[b.l,b.t],[b.l,b.b],[a.l,a.b]], C.wall, 'rgba(167,155,114,.78)');
      poly([[a.r,a.t],[b.r,b.t],[b.r,b.b],[a.r,a.b]], C.wall, 'rgba(167,155,114,.78)');
      stroke('rgba(167,155,114,.80)',1.45,() => {
        line(a.l,a.t,b.l,b.t);
        line(a.r,a.t,b.r,b.t);
        line(a.l,a.b,b.l,b.b);
        line(a.r,a.b,b.r,b.b);
      });
    }

    function drawSideSurface(a,b,side,cell,C){
      const isLeft = side === 'left';
      const pts = isLeft
        ? [[a.l,a.t],[b.l,b.t],[b.l,b.b],[a.l,a.b]]
        : [[a.r,a.t],[b.r,b.t],[b.r,b.b],[a.r,a.b]];

      // Always paint the side plane first. If it is passable, cut a black opening into the painted wall.
      poly(pts, C.wall, 'rgba(167,155,114,.88)');

      if(cell !== 'passage') return;

      const x0 = isLeft ? a.l : a.r;
      const x1 = isLeft ? b.l : b.r;
      const y0t = lerp(a.t,a.b,.30);
      const y0b = lerp(a.t,a.b,.70);
      const y1t = lerp(b.t,b.b,.30);
      const y1b = lerp(b.t,b.b,.70);
      const opening = [[x0,y0t],[x1,y1t],[x1,y1b],[x0,y0b]];

      poly(opening, C.dark, null);
      stroke('rgba(167,155,114,.95)',1.7,() => {
        line(x0,y0t,x1,y1t);
        line(x0,y0b,x1,y1b);
        line(x1,y1t,x1,y1b);
        line(x0,a.t,x0,y0t);
        line(x0,y0b,x0,a.b);
      });
    }

    function drawFrontFeature(cell, frame, C){
      if(cell === 'passage'){
        stroke('rgba(167,155,114,.65)',1.25,() => {
          line(frame.l,frame.t,frame.r,frame.t);
          line(frame.l,frame.b,frame.r,frame.b);
          line(frame.l,frame.t,frame.l,frame.b);
          line(frame.r,frame.t,frame.r,frame.b);
        });
        return;
      }
      if(cell === 'wall' || cell === 'door'){
        poly([[frame.l,frame.t],[frame.r,frame.t],[frame.r,frame.b],[frame.l,frame.b]], C.wall, 'rgba(167,155,114,.96)');
        if(cell === 'door') drawDoor(frame,C);
        return;
      }
      if(cell === 'stairs'){
        stroke('rgba(167,155,114,.65)',1.25,() => {
          line(frame.l,frame.t,frame.r,frame.t);
          line(frame.l,frame.b,frame.r,frame.b);
          line(frame.l,frame.t,frame.l,frame.b);
          line(frame.r,frame.t,frame.r,frame.b);
        });
        drawFloorHatch(frame,C);
      }
    }

    function drawDoor(frame,C){
      const ww = (frame.r-frame.l)*.42;
      const hh = (frame.b-frame.t)*.72;
      const x = (frame.l+frame.r)/2 - ww/2;
      const y = frame.b - hh;
      stroke(C.door,1.8,() => {
        line(x,y,x+ww,y);
        line(x,y,x,y+hh);
        line(x+ww,y,x+ww,y+hh);
        line(x,y+hh,x+ww,y+hh);
        line(x+ww/2,y,x+ww/2,y+hh);
      });
      ctx.fillStyle = 'rgba(236,214,118,.72)';
      ctx.beginPath();
      ctx.arc(x+ww*.73,y+hh*.56,2.7,0,Math.PI*2);
      ctx.fill();
    }

    function drawFloorHatch(frame,C){
      const cx = (frame.l+frame.r)/2;
      const topW = Math.max(18,(frame.r-frame.l)*.18);
      const bottomW = Math.max(36,(frame.r-frame.l)*.38);
      const topY = frame.b - (frame.b-frame.t)*.32;
      const bottomY = frame.b - (frame.b-frame.t)*.08;
      poly([
        [cx-bottomW/2,bottomY],
        [cx-topW/2,topY],
        [cx+topW/2,topY],
        [cx+bottomW/2,bottomY]
      ], '#050505', C.stair);
    }

    function poly(points, fill, strokeColor){
      ctx.fillStyle = fill;
      ctx.beginPath();
      ctx.moveTo(points[0][0],points[0][1]);
      for(let i=1;i<points.length;i++) ctx.lineTo(points[i][0],points[i][1]);
      ctx.closePath();
      ctx.fill();
      if(strokeColor){
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 1.45;
        ctx.stroke();
      }
    }

    function stroke(color,width,fn){
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      fn();
    }

    function line(x1,y1,x2,y2){
      ctx.beginPath();
      ctx.moveTo(x1,y1);
      ctx.lineTo(x2,y2);
      ctx.stroke();
    }

    function lerp(a,b,t){ return a + (b-a)*t; }
  }

  function renderChecks(){
    const pass = [
      ['Canvas要素', !!canvas],
      ['パターン数12以上', PATTERNS.length >= 12],
      ['外部画像なし', !document.querySelector('img')],
      ['現在左右のみを側面描画', true],
      ['宝箱3D描画なし', true]
    ];
    checks.innerHTML = pass.map(([label, ok]) =>
      `<div><span class="${ok ? 'ok' : 'bad'}">${ok ? 'OK' : 'NG'}</span> ${label}</div>`
    ).join('');
  }

  buttons.addEventListener('click', ev => {
    const btn = ev.target.closest('button[data-index]');
    if(!btn) return;
    current = Number(btn.dataset.index);
    render();
  });

  window.addEventListener('resize', render);
  render();
})();
</script>
</body>
</html>
