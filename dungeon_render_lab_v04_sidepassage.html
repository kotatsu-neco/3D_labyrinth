<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dungeon Render Lab v04 Side Passage Fix</title>
<style>
:root{
  --bg:#000;
  --fg:#eee8d0;
  --muted:#aaa384;
  --line:#d8d0a5;
  --line2:#a79b72;
  --accent:#ecd676;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  background:#000;
  color:var(--fg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
}
body{overflow-x:hidden}
#app{
  width:min(100vw,560px);
  min-height:100svh;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 10px calc(env(safe-area-inset-bottom,0px) + 12px);
}
.header{
  border-bottom:1px solid var(--line2);
  padding:4px 2px 8px;
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:flex-end;
}
.title{font-size:17px;font-weight:900;letter-spacing:.04em}
.meta{font-size:12px;color:var(--muted);text-align:right}
.viewport{
  margin-top:8px;
  border:2px solid var(--line2);
  background:#000;
  position:relative;
  height:clamp(250px,42svh,340px);
  overflow:hidden;
}
#view{
  width:100%;
  height:100%;
  display:block;
  background:#000;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
.caption{
  position:absolute;
  left:12px;
  top:10px;
  font-weight:900;
  font-size:13px;
  color:rgba(238,232,208,.92);
  text-shadow:0 1px 2px #000;
  pointer-events:none;
}
.triplet{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  pointer-events:none;
}
.triplet span{
  border:1px solid rgba(216,208,165,.70);
  background:rgba(0,0,0,.78);
  color:#eee8d0;
  text-align:center;
  padding:5px 3px;
  font-size:13px;
}
.panel{
  border:1px solid var(--line2);
  background:linear-gradient(180deg,#0b0b09,#050504);
  padding:9px;
  margin-top:8px;
}
.panel h2{
  font-size:15px;
  margin:0 0 6px;
  color:var(--accent);
}
.note{
  color:var(--muted);
  font-size:13px;
  line-height:1.45;
}
.controls{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:6px;
  margin-top:8px;
}
button{
  min-height:44px;
  border:1px solid var(--line2);
  background:linear-gradient(180deg,#171611,#090908);
  color:var(--fg);
  font:inherit;
  font-weight:850;
  padding:7px 6px;
}
button.active{
  border-color:var(--accent);
  color:#fff5b8;
  box-shadow:inset 0 0 0 1px rgba(236,214,118,.25);
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  margin-top:8px;
}
.cell{
  border:1px solid var(--line2);
  background:#050504;
  padding:6px;
  min-height:48px;
}
.cell b{color:var(--accent);display:block;font-size:12px}
.cell span{font-size:13px}
.checks{
  font-size:12px;
  line-height:1.5;
  color:var(--muted);
  margin-top:8px;
}
.ok{color:#aee6aa}
@media(max-width:380px){
  .controls{grid-template-columns:1fr}
  .viewport{height:260px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title">Dungeon Render Lab v04</div>
    <div class="meta">Dot-pattern / split side-passage walls</div>
  </div>

  <div class="viewport">
    <canvas id="view"></canvas>
    <div class="caption" id="caption"></div>
    <div class="triplet" id="triplet"></div>
  </div>

  <div class="panel">
    <h2>検証対象</h2>
    <div class="note">
      v03 の「側面壁を丸ごと描いて開口をくり抜く」方式をやめ、左右通路時は上壁片・下壁片を最初から別形状として描く検証です。内側の余計な輪郭と石壁模様を減らし、通路口を大きく黒く取ります。
    </div>
    <div class="grid" id="readout"></div>
  </div>

  <div class="panel">
    <h2>パターン切替</h2>
    <div class="controls" id="buttons"></div>
  </div>

  <div class="panel">
    <h2>自己検査</h2>
    <div class="checks" id="checks"></div>
  </div>
</div>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('view');
  const caption = document.getElementById('caption');
  const triplet = document.getElementById('triplet');
  const readout = document.getElementById('readout');
  const buttons = document.getElementById('buttons');
  const checks = document.getElementById('checks');

  const PATTERNS = [
    {id:'straight', name:'直進通路', left:'wall', front:['passage','passage','wall'], right:'wall'},
    {id:'left_open', name:'左通路', left:'passage', front:['passage','passage','wall'], right:'wall'},
    {id:'right_open', name:'右通路', left:'wall', front:['passage','passage','wall'], right:'passage'},
    {id:'cross', name:'左右通路', left:'passage', front:['passage','passage','wall'], right:'passage'},
    {id:'deadend', name:'行き止まり', left:'wall', front:['wall'], right:'wall'},
    {id:'tee', name:'T字路', left:'passage', front:['wall'], right:'passage'},
    {id:'door_near', name:'正面扉', left:'wall', front:['door'], right:'wall'},
    {id:'door_far', name:'奥の扉', left:'wall', front:['passage','door'], right:'wall'},
    {id:'wall_far', name:'奥の壁', left:'wall', front:['passage','wall'], right:'wall'},
    {id:'stairs_near', name:'階段イベント近', left:'wall', front:['stairs'], right:'wall'},
    {id:'stairs_far', name:'階段イベント遠', left:'wall', front:['passage','stairs'], right:'wall'},
    {id:'long', name:'長い通路', left:'wall', front:['passage','passage','passage'], right:'wall'}
  ];

  let current = 0;

  function labelCell(v){
    if(v === 'wall') return '壁';
    if(v === 'passage') return '通路';
    if(v === 'door') return '扉';
    if(v === 'stairs') return '階段';
    return '未描画';
  }

  function render(){
    const p = PATTERNS[current];
    caption.textContent = p.name;
    triplet.innerHTML = `<span>左: ${labelCell(p.left)}</span><span>前: ${labelCell(p.front[0])}</span><span>右: ${labelCell(p.right)}</span>`;
    readout.innerHTML = [
      ['左', labelCell(p.left)],
      ['前1', labelCell(p.front[0])],
      ['前2', labelCell(p.front[1])],
      ['前3', labelCell(p.front[2])],
      ['右', labelCell(p.right)],
      ['方式', '側通路分割壁']
    ].map(([k,v]) => `<div class="cell"><b>${k}</b><span>${v}</span></div>`).join('');
    buttons.innerHTML = PATTERNS.map((q,i) =>
      `<button class="${i===current ? 'active' : ''}" data-index="${i}">${i+1}. ${q.name}</button>`
    ).join('');
    drawPattern(p);
    renderChecks();
  }

  function drawPattern(pattern){
    const box = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(box.width * dpr));
    canvas.height = Math.max(1, Math.floor(box.height * dpr));
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr,0,0,dpr,0,0);

    const W = box.width;
    const H = box.height;

    const BW = 160, BH = 120;
    const buf = document.createElement('canvas');
    buf.width = BW;
    buf.height = BH;
    const g = buf.getContext('2d', { alpha:false });
    g.imageSmoothingEnabled = false;

    const C = {
      bg:'#000000',
      wall:'#6a6a6a',
      wall2:'#8a8a8a',
      wall3:'#4c4c4c',
      line:'#d8d0a5',
      line2:'#a79b72',
      door2:'#c08b43',
      event:'#7fbf7f'
    };

    g.fillStyle = C.bg;
    g.fillRect(0,0,BW,BH);

    const F = [
      {l:10, r:150, t:10, b:110},
      {l:34, r:126, t:26, b:94},
      {l:56, r:104, t:42, b:78},
      {l:68, r:92, t:50, b:70}
    ];

    // Forward corridor first.
    for(let i=2;i>=0;i--){
      const cell = pattern.front[i] || 'wall';
      const a = F[i];
      const b = F[i+1];
      if(cell === 'passage'){
        drawPassageSegment(g, a, b, C);
      }else if(cell === 'wall'){
        if(i>0) drawPassageSegment(g, a, b, C);
        drawFrontWall(g, b, C, false);
        break;
      }else if(cell === 'door'){
        if(i>0) drawPassageSegment(g, a, b, C);
        drawFrontWall(g, b, C, true);
        break;
      }else if(cell === 'stairs'){
        drawPassageSegment(g, a, b, C);
        drawFloorEvent(g, b, C);
        break;
      }
    }

    // Current side walls/passages last for readability.
    drawSideNear(g, F[0], F[1], 'left', pattern.left, C);
    drawSideNear(g, F[0], F[1], 'right', pattern.right, C);

    rect(g, 1,1, BW-2, BH-2, C.line2);
    rect(g, 4,4, BW-8, BH-8, C.line2);

    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(buf, 0,0,W,H);

    function drawPassageSegment(g,a,b,C){
      // fill side wall faces for this depth
      fillTrapStone(g, [[a.l,a.t],[b.l,b.t],[b.l,b.b],[a.l,a.b]], C, 'normal');
      fillTrapStone(g, [[a.r,a.t],[b.r,b.t],[b.r,b.b],[a.r,a.b]], C, 'normal');

      // corridor edges
      pixLine(g,a.l,a.t,b.l,b.t,C.line);
      pixLine(g,a.r,a.t,b.r,b.t,C.line);
      pixLine(g,a.l,a.b,b.l,b.b,C.line);
      pixLine(g,a.r,a.b,b.r,b.b,C.line);
      pixLine(g,b.l,b.t,b.r,b.t,C.line2);
      pixLine(g,b.l,b.b,b.r,b.b,C.line2);
    }

    function drawSideNear(g,a,b,side,cell,C){
      const isLeft = side === 'left';
      const x0 = isLeft ? a.l : a.r;
      const x1 = isLeft ? b.l : b.r;
      const top0 = Math.round(lerp(a.t,a.b,.30));
      const bot0 = Math.round(lerp(a.t,a.b,.70));
      const top1 = Math.round(lerp(b.t,b.b,.30));
      const bot1 = Math.round(lerp(b.t,b.b,.70));

      if(cell === 'wall'){
        const trap = isLeft
          ? [[a.l,a.t],[b.l,b.t],[b.l,b.b],[a.l,a.b]]
          : [[a.r,a.t],[b.r,b.t],[b.r,b.b],[a.r,a.b]];
        fillTrapStone(g, trap, C, 'normal');
        return;
      }

      // Passage side: do NOT draw a full wall then cut a hole.
      // Draw top piece and bottom piece independently.
      const topPiece = isLeft
        ? [[x0,a.t],[x1,b.t],[x1,top1],[x0,top0]]
        : [[x0,a.t],[x1,b.t],[x1,top1],[x0,top0]];
      const bottomPiece = isLeft
        ? [[x0,bot0],[x1,bot1],[x1,b.b],[x0,a.b]]
        : [[x0,bot0],[x1,bot1],[x1,b.b],[x0,a.b]];

      fillTrapStone(g, topPiece, C, 'passage');
      fillTrapStone(g, bottomPiece, C, 'passage');

      // Wide black opening
      fillTrap(g, [[x0,top0],[x1,top1],[x1,bot1],[x0,bot0]], C.bg);

      // Only essential opening lines
      pixLine(g,x0,top0,x1,top1,C.line);
      pixLine(g,x0,bot0,x1,bot1,C.line);
      pixLine(g,x1,top1,x1,bot1,C.line);

      // Outer edge hints
      pixLine(g,x0,a.t,x0,top0,C.line);
      pixLine(g,x0,bot0,x0,a.b,C.line);
    }

    function drawFrontWall(g,f,C,door){
      fillRectStone(g, f.l, f.t, f.r-f.l, f.b-f.t, C, 'normal');
      rect(g,f.l,f.t,f.r-f.l,f.b-f.t,C.line);
      if(door){
        const ww = Math.max(10, Math.floor((f.r-f.l)*0.42));
        const hh = Math.max(14, Math.floor((f.b-f.t)*0.72));
        const x = Math.floor((f.l+f.r)/2 - ww/2);
        const y = f.b - hh;
        rect(g,x,y,ww,hh,C.door2);
        pixLine(g,x+Math.floor(ww/2),y,x+Math.floor(ww/2),y+hh,C.door2);
        fill(g,x+ww-4,y+Math.floor(hh*0.55),2,2,C.door2);
      }
    }

    function drawFloorEvent(g,f,C){
      const cx = Math.floor((f.l+f.r)/2);
      const topW = Math.max(8, Math.floor((f.r-f.l)*0.18));
      const botW = Math.max(16, Math.floor((f.r-f.l)*0.36));
      const topY = f.b - Math.floor((f.b-f.t)*0.30);
      const botY = f.b - Math.floor((f.b-f.t)*0.08);
      pixLine(g, cx-Math.floor(botW/2), botY, cx-Math.floor(topW/2), topY, C.event);
      pixLine(g, cx-Math.floor(topW/2), topY, cx+Math.floor(topW/2), topY, C.event);
      pixLine(g, cx+Math.floor(topW/2), topY, cx+Math.floor(botW/2), botY, C.event);
      pixLine(g, cx+Math.floor(botW/2), botY, cx-Math.floor(botW/2), botY, C.event);
    }

    function fillRectStone(g,x,y,w,h,C,mode){
      fill(g,x,y,w,h,C.wall);
      const step = mode === 'passage' ? 7 : 6;
      const maxLines = mode === 'passage' ? 2 : 99;
      let count = 0;
      for(let yy=y+2; yy<y+h-2 && count < maxLines; yy+=step){
        pixLine(g,x+1,yy,x+w-2,yy,C.wall2);
        const offset = (Math.floor((yy-y)/step) % 2) * 4;
        for(let xx=x+1+offset; xx<x+w-2; xx+=8){
          pixLine(g,xx,yy,xx,Math.min(yy+3,y+h-2),C.wall3);
        }
        count++;
      }
    }

    function fillTrapStone(g,pts,C,mode){
      fillTrap(g, pts, C.wall);
      const minY = Math.min(pts[0][1],pts[1][1],pts[2][1],pts[3][1]);
      const maxY = Math.max(pts[0][1],pts[1][1],pts[2][1],pts[3][1]);
      const step = mode === 'passage' ? 7 : 6;
      const maxLines = mode === 'passage' ? 2 : 99;
      let count = 0;
      for(let y=minY+3; y<maxY-2 && count < maxLines; y+=step){
        const span = spanAtY(pts, y);
        const lx = span[0], rx = span[1];
        if(lx === null) continue;
        pixLine(g, lx+1, y, rx-1, y, C.wall2);
        count++;
      }
      outlineTrap(g, pts, C.line);
    }

    function outlineTrap(g,pts,color){
      pixLine(g,pts[0][0],pts[0][1],pts[1][0],pts[1][1],color);
      pixLine(g,pts[1][0],pts[1][1],pts[2][0],pts[2][1],color);
      pixLine(g,pts[2][0],pts[2][1],pts[3][0],pts[3][1],color);
      pixLine(g,pts[3][0],pts[3][1],pts[0][0],pts[0][1],color);
    }

    function fillTrap(g,pts,color){
      const minY = Math.min(pts[0][1],pts[1][1],pts[2][1],pts[3][1]);
      const maxY = Math.max(pts[0][1],pts[1][1],pts[2][1],pts[3][1]);
      for(let y=minY; y<=maxY; y++){
        const span = spanAtY(pts, y);
        const lx = span[0], rx = span[1];
        if(lx !== null){
          fill(g, lx, y, rx-lx+1, 1, color);
        }
      }
    }

    function spanAtY(pts, y){
      const xs = [];
      for(let i=0;i<pts.length;i++){
        const a = pts[i];
        const b = pts[(i+1)%pts.length];
        const y1 = a[1], y2 = b[1];
        const x1 = a[0], x2 = b[0];
        if(y1 === y2){
          if(y === y1){
            xs.push(x1,x2);
          }
          continue;
        }
        if((y >= Math.min(y1,y2)) && (y <= Math.max(y1,y2))){
          const t = (y - y1) / (y2 - y1);
          const x = Math.round(x1 + (x2 - x1) * t);
          xs.push(x);
        }
      }
      if(xs.length < 2) return [null, null];
      xs.sort((a,b) => a-b);
      return [xs[0], xs[xs.length-1]];
    }

    function fill(g,x,y,w,h,color){
      g.fillStyle = color;
      g.fillRect(x,y,w,h);
    }

    function rect(g,x,y,w,h,color){
      g.strokeStyle = color;
      g.lineWidth = 1;
      g.strokeRect(x+0.5,y+0.5,w,h);
    }

    function pixLine(g,x1,y1,x2,y2,color){
      g.strokeStyle = color;
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(Math.round(x1)+0.5,Math.round(y1)+0.5);
      g.lineTo(Math.round(x2)+0.5,Math.round(y2)+0.5);
      g.stroke();
    }

    function lerp(a,b,t){ return a + (b-a)*t; }
  }

  function renderChecks(){
    const pass = [
      ['Canvas要素', !!canvas],
      ['パターン数12', PATTERNS.length === 12],
      ['左右通路は分割壁方式', true],
      ['全面壁→くり抜き方式を停止', true],
      ['宝箱3D描画なし', true],
      ['固定パターン前提', true]
    ];
    checks.innerHTML = pass.map(([label, ok]) =>
      `<div><span class="${ok ? 'ok' : 'bad'}">${ok ? 'OK' : 'NG'}</span> ${label}</div>`
    ).join('');
  }

  buttons.addEventListener('click', ev => {
    const btn = ev.target.closest('button[data-index]');
    if(!btn) return;
    current = Number(btn.dataset.index);
    render();
  });

  window.addEventListener('resize', render);
  render();
})();
</script>
</body>
</html>
